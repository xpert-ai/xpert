<div
  class="relative flex-1 w-full rounded-lg p-[2px] from-rose-400 via-fuchsia-500 to-indigo-500"
  [class.bg-gradient-to-r]="true"
  [class.ngm-background-animate]="answering()"
>
  <form
    class="flex rounded-md px-2 py-1 overflow-hidden bg-white dark:bg-components-panel-bg"
    [formGroup]="formGroup"
    (ngSubmit)="onSubmit()"
  >
    <div class="px-2 left-0 flex items-center">
      <span class="font-notoColorEmoji">🤖</span>
    </div>
    <z-combobox
      zTriggerMode="input"
      class="w-full"
      [value]="null"
      [options]="comboboxOptions()"
      placeholder=" {{ 'Copilot.Ask' | translate: { Default: 'Ask' } }}..."
      [zSearchTerm]="promptControl.value ?? ''"
      [zSelectOnEnter]="false"
      (zSearchTermChange)="onSearchTermChange($event)"
    >
      <ng-template zComboboxOption let-option let-searchTerm="searchTerm">
        <span [ngmHighlight]="searchTerm" [content]="option.value"></span>
      </ng-template>
    </z-combobox>
    @if (error) {
      <div class="whitespace-nowrap text-ellipsis overflow-hidden text-red-400" [zTooltip]="error">
        {{ error }}
      </div>
    }
  </form>
</div>
