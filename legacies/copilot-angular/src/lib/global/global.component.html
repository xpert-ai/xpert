<button
  z-button
  zType="ghost"
  zSize="icon"
  zShape="circle"
  class="text-xl font-notoColorEmoji"
  zTooltip="{{ 'PAC.Copilot.YourAIPairProgrammer' | translate: { Default: 'Your AI pair programmer' } }}"
  [floatUi]="copilotPopper"
  [showTrigger]="eNgxFloatUiTriggers.click"
  hideOnClickOutside
  [hideOnScroll]="true"
  [placement]="eNgxFloatUiPlacements.BOTTOMEND"
>
  <div class="flex justify-center items-center text-xl">🤖</div>
</button>

<float-ui-content #copilotPopper>
  <ngm-copilot-chat
    class="w-[100vw] sm:w-[400px] h-[600px]"
    [copilotEngine]="copilotGlobalService.copilotEngine"
  ></ngm-copilot-chat>
</float-ui-content>
