<div class="text-lg">
  {{ 'Copilot.Options' | translate: { Default: 'Options' } }}
</div>

<label class="pt-4"
  >{{ 'Copilot.RecursionLimit' | translate: { Default: 'Recursion Limit' } }}:
  <span class="font-notoColorEmoji" zTooltip="Maximum number of loop calls" zPosition="top">💡</span>
</label>
<z-slider min="1" max="100" step="1" [showValueLabel]="true" [(ngModel)]="recursionLimit"></z-slider>

<z-checkbox [(ngModel)]="interactive" color="accent" labelPosition="before">
  {{ 'Copilot.Interactive' | translate: { Default: 'Interactive' } }}
</z-checkbox>
<z-checkbox [(ngModel)]="verbose" color="accent" labelPosition="before">
  {{ 'Copilot.Verbose' | translate: { Default: 'Verbose' } }}
</z-checkbox>
