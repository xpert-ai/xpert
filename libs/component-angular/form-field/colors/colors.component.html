<div class="ngm-density__compact flex flex-col items-stretch">
  <div class="flex justify-between items-center mx-2">
    <label class="p-1 shrink-0 text-sm text-ellipsis whitespace-nowrap overflow-hidden">{{ label }}</label>

    <span class="flex-1"></span>

    @if (value) {
      <button z-button zType="ghost" zSize="icon" zShape="circle" displayDensity="compact" [disabled]="!value" (click)="swapColors($event)">
        <z-icon class="m-0" style="margin: 0;" zType="swap_horiz"></z-icon>
      </button>
    }

    <div class="flex justify-center items-center overflow-hidden" [@listEnterAnimation]="value">
      @for (color of value; track color) {
        <div class="w-4 h-4"
          [style.background-color]="color"
        ></div>
      }
    </div>
  </div>

  <div class="relative flex items-center mx-1">
    <z-combobox
      zTriggerMode="input"
      class="ngm-input-element ngm-w-full"
      [value]="value"
      [groups]="colorGroups()"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [allowCustomValue]="true"
      [zSearchTerm]="searchTerm()"
      [zDisplayWith]="displayColors"
      (zSearchTermChange)="onSearchTermChange($event)"
      (zValueChange)="onComboboxValueChange($event)"
      (zBlur)="onTouched()"
    >
      <ng-template zComboboxOption let-option>
        <div class="flex justify-start items-center">
          @for (color of option.data?.colors; track color) {
            <div class="w-4 h-4" [style.background-color]="color"></div>
          }
        </div>
      </ng-template>
    </z-combobox>

    @if (value) {
      <button z-button zType="ghost" zSize="icon" zShape="circle" class="ngm-colors__clear right-0" displayDensity="compact" (click)="clear()">
        <z-icon zType="close"></z-icon>
      </button>
    }
  </div>

</div>
