@if (isRowContext) {
  @for (action of actions; track action) {
    <igx-grid-action-button class="smart-grid__action" classNames='igx-action-strip__menu-item--danger'
      [iconName]="action.iconName"
      [labelText]="action.label"
      (actionClick)="onActionClick($event, action.action)">
    </igx-grid-action-button>
  }
}
