<div *ngIf="cell" class="contextmenu" [ngStyle]="{'left.px': x, 'top.px': y}">
    <span class=item (click)="copySelectedCellData($event)">
        <z-icon class="icon mr-1" zSize="sm" zType="content_copy"></z-icon>Copy Cell Data
    </span>
    <span class=item (click)="copyRowData($event)">
        <z-icon class="icon mr-1" zSize="sm" zType="content_copy"></z-icon>Copy Row Data
    </span>
    <span *ngIf="hasMultiCellSelection()" class=item (click)="copySelectedCells($event)">
        <z-icon class="icon mr-1" zSize="sm" zType="content_copy"></z-icon>Copy Cells Data
    </span>
</div>
