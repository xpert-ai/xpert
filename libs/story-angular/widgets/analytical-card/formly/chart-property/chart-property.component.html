<ngm-chart-property class="w-full group"
  [label]="props?.label"
  [capacities]="capacities"
  [dataSettings]="dataSettings$ | async"
  [entityType]="entityType$ | async"
  [chartType]="chartType$ | async"
  [formControl]="formControl"
>
  @if (removeable) {
    <button z-button zType="ghost" zSize="icon" zShape="circle" ngmSuffix class="opacity-0 group-hover:opacity-100 transition-opacity duration-100" displayDensity="compact" ngmAppearance="danger" color="warn" (click)="$event.stopPropagation();$event.preventDefault();killMyself()">
      <z-icon zType="clear"></z-icon>
    </button>
  } @else {
    <button z-button zType="ghost" zSize="icon" zShape="circle" ngmSuffix class="opacity-0 group-hover:opacity-100 transition-opacity duration-100" displayDensity="compact" ngmAppearance="danger" color="warn" (click)="$event.stopPropagation();$event.preventDefault();clear()">
      <z-icon zType="clear"></z-icon>
    </button>
  }
</ngm-chart-property>
