<form [formGroup]="form" (ngSubmit)="requestPass()" role="form" class="flex flex-col justify-start items-stretch">
  <div class="flex flex-col justify-start items-stretch">
    <div class="flex flex-col justify-start items-stretch p-2">
      <div>
        <label for="email" class="block mb-2 text-base font-medium text-text-primary">
          {{ 'AUTH.LOGIN.ACCOUNT' | translate: {Default: 'Account'} }}
        </label>
        <input type="email" name="email" id="email" formControlName="email" [placeholder]="'AUTH.LOGIN.USERNAME' | translate: {Default: 'Username / Email'}"
          class="w-full rounded-lg border border-divider-regular bg-components-input-bg-normal px-4 py-2 text-text-primary focus:border-components-input-border-active focus:outline-none focus:ring-2 focus:ring-components-input-border-active"
          required>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn disabled:btn-disabled btn-primary btn-medium mb-2"
          [disabled]="submitted || form.invalid">
          {{ 'Auth.RequestSend' | translate: {Default: 'Send'} }}
        </button>
      </div>

      <div class="w-full my-4 border-t border-divider-regular"></div>

      <div class="flex flex-row justify-between items-center">
        <a routerLink="/auth/login" class="text-[var(--ngm-color-primary)] hover:underline">{{ 'Auth.Signin' | translate: {Default: 'Sign-in'} }}</a>
        @if (enablePublicSignup) {
          <a routerLink="/auth/register" class="text-[var(--ngm-color-primary)] hover:underline">{{ 'Auth.Signup' | translate: {Default: 'Signup'} }}</a>
        }
      </div>
    </div>
  </div>
</form>
