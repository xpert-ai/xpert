<form [formGroup]="form" (ngSubmit)="requestPass()" role="form" class="flex flex-col justify-start items-stretch">
  <div class="flex flex-col justify-start items-stretch">
    <div class="flex flex-col justify-start items-stretch p-2">
      <div>
        <label for="email" class="block mb-2 text-base font-medium text-text-primary">
          {{ 'AUTH.LOGIN.ACCOUNT' | translate: { Default: 'Account' } }}
        </label>
        <input
          z-input
          type="email"
          name="email"
          id="email"
          formControlName="email"
          [placeholder]="'AUTH.LOGIN.USERNAME' | translate: { Default: 'Username / Email' }"
          required
        />
      </div>

      <div class="mt-4">
        <button
          z-button
          type="submit"
          class="mb-2 h-10 px-5 text-sm font-medium"
          [disabled]="submitted || form.invalid"
        >
          {{ 'Auth.RequestSend' | translate: { Default: 'Send' } }}
        </button>
      </div>

      <div class="w-full my-4 border-t border-divider-regular"></div>

      <div class="flex flex-row justify-between items-center">
        <a
          routerLink="/auth/login"
          class="text-primary-500 hover:text-primary-600 dark:text-primary-400 dark:hover:text-primary-300 hover:underline"
        >
          {{ 'Auth.Signin' | translate: { Default: 'Sign-in' } }}
        </a>
        @if (enablePublicSignup) {
          <a
            routerLink="/auth/register"
            class="text-primary-500 hover:text-primary-600 dark:text-primary-400 dark:hover:text-primary-300 hover:underline"
          >
            {{ 'Auth.Signup' | translate: { Default: 'Signup' } }}
          </a>
        }
      </div>
    </div>
  </div>
</form>
