<div class="pac-auth-card flex flex-col justify-start items-center pb-2 m-auto rounded-xl shadow-lg dark:border dark:border-neutral-800">
  <div class="pac-auth__header my-8">
    <img class="pac-auth__logo w-10 h-10 rounded-xl mr-2" [src]="appConfigs()?.app_logo || 'assets/logo.png'" />
    <span>
      {{ title() || appConfigs()?.app_name || ('Auth.AppName' | translate: { Default: 'Xpert AI Cloud' }) }}
    </span>
  </div>
    
  <router-outlet></router-outlet>

  <div class="flex justify-between items-center gap-2">

    <z-select class="w-32"
      id="countries"
      [ngModel]="language()"
      (ngModelChange)="onLanguage($event)"
    >
      <z-select-item zValue="en">English</z-select-item>
      <z-select-item zValue="zh-Hans">中文简体</z-select-item>
      <z-select-item zValue="zh-Hant">中文繁体</z-select-item>
    </z-select>

    <div class="pac-auth__copyright flex-1 flex items-center whitespace-pre">
      {{ 'Auth.Copyright' | translate: { Default: 'Copyright' } }}
      <span class="text-text-primary">©</span>
      2026 <a href="https://xpertai.cn" target="_blank">XpertAI</a> Inc.
    </div>
  </div>
</div>
