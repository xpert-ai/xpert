<z-tab-group stretchTabs [disableRipple]="to?.disableRipple">
  <z-tab *ngFor="let tab of field.fieldGroup; let i = index; let last = last">
    <ng-template zTabLabel>
      <mat-icon *ngIf="tab.templateOptions?.['icon']" fontSet="material-icons-outlined">{{tab.templateOptions?.['icon']}}</mat-icon>
      {{tab.templateOptions?.label}}
    </ng-template>

    <formly-field [field]="tab"></formly-field>
  </z-tab>
</z-tab-group>
