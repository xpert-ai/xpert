<z-tab-group stretchTabs [disableRipple]="to?.disableRipple">
  @for (tab of field.fieldGroup; track tab; let i = $index; let last = $last) {
    <z-tab>
      <ng-template zTabLabel>
        @if (tab.templateOptions?.['icon']) {
          <z-icon [zType]="tab.templateOptions?.['icon']"></z-icon>
        }
        {{tab.templateOptions?.label}}
      </ng-template>
      <formly-field [field]="tab"></formly-field>
    </z-tab>
  }
</z-tab-group>
