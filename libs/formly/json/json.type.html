<label class="p-1 text-sm text-ellipsis whitespace-nowrap overflow-hidden">{{to?.label}}</label>

<textarea z-input class="ngm-input-element" [formControl]="fControl" [placeholder]="to?.placeholder"
  [formlyAttributes]="field"
  [id]="id"
  [readonly]="to.readonly"
  [required]="to.required"
  [tabindex]="to.tabindex"
  [cols]="to.cols"
  [rows]="to.rows"
  [cdkTextareaAutosize]="to.autosize"
  [cdkAutosizeMinRows]="to.autosizeMinRows"
  [cdkAutosizeMaxRows]="to.autosizeMaxRows"
  [class.cdk-textarea-autosize]="to.autosize"
></textarea>

<z-form-message zType="error" class="text-xs h-4">
  @if (fControl.invalid) {
    @for (item of fControl.errors | keyvalue; track item) {
      <span>{{item.value.message}}</span>
    }
  }
</z-form-message>
