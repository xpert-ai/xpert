include:
  - ./docker-compose.infra.yml

volumes:
  api_data:

services:
  # OLAP Services
  olap:
    image: registry.cn-hangzhou.aliyuncs.com/metad/xpert-olap:latest
    profiles:
      - bi
    restart: on-failure
    healthcheck:
      test: curl -m 5 --silent --fail --request GET http://localhost:8080/
      interval: 30s
      timeout: 30s
      retries: 3
    links:
      - db:${DB_HOST:-db}
    depends_on:
      - api
    environment:
      REDIS_DATABASE: 1
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - overlay

  api:
    image: registry.cn-hangzhou.aliyuncs.com/metad/xpert-api:latest
    deploy:
      replicas: ${API_REPLICAS:-1}
    environment:
      # HOST: ${API_HOST:-api}
      # PORT: ${API_PORT:-3000}
      NODE_OPTIONS: '--max-old-space-size=8192'
      NODE_ENV: ${NODE_ENV:-development}
      IS_DOCKER: true
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLAP_HOST: olap
      OLAP_PORT: 8080
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    entrypoint: './entrypoint.compose.sh'
    command: ['pm2-runtime', 'main.js']
    restart: unless-stopped
    depends_on:
      - db
      - redis
    links:
      - db:${DB_HOST:-db}
    expose:
      - '3000'
    volumes:
      - ./volumes/api/public:/srv/xpert/public
      - ./volumes/api/sandbox/:/sandbox/
      - ./volumes/api/data/:/var/lib/xpert/data/
    networks:
      - overlay

  webapp:
    image: registry.cn-hangzhou.aliyuncs.com/metad/xpert-webapp:latest
    environment:
      HOST: ${WEB_HOST:-webapp}
      NODE_ENV: ${NODE_ENV:-development}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      WEBAPP_API_BASE_URL: ${WEBAPP_API_BASE_URL:-}
      VITE_CHATKIT_FRAME_URL: ${VITE_CHATKIT_FRAME_URL:-/chatkit}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:4200}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEFAULT_LATITUDE: ${DEFAULT_LATITUDE:-42.6459136}
      DEFAULT_LONGITUDE: ${DEFAULT_LONGITUDE:-23.3332736}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      API_HOST: api
      API_PORT: 3000
      ENABLE_LOCAL_AGENT: false
    entrypoint: './entrypoint.compose.sh'
    command: ['nginx', '-g', 'daemon off;']
    env_file:
      - .env
    restart: on-failure
    links:
      - api:${API_HOST:-api}
    depends_on:
      - api
    ports:
      - ${WEB_PORT:-80}:80
      - ${API_PORT:-3000}:3000
      # - 443:443
    volumes:
      - ../.deploy/webapp/nginx.compose.conf:/etc/nginx/conf.d/compose.conf.template:ro
      - ./volumes/webapp/:/webapp/
    networks:
      - overlay
