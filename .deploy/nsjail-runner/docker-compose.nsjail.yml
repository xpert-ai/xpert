# Opt-in overlay. Run from the repository root together with docker-compose.yml.
services:
  api:
    environment:
      NSJAIL_RUNNER_URL: http://nsjail-runner:8090
      NSJAIL_RUNNER_TOKEN: ${NSJAIL_RUNNER_TOKEN:?Set NSJAIL_RUNNER_TOKEN before enabling NsJail}
    networks:
      - overlay
      - nsjail-control

  nsjail-runner:
    image: xpert-nsjail-runner:3.6
    build:
      context: .
      dockerfile: .deploy/nsjail-runner/Dockerfile
      args:
        NSJAIL_COMMIT: f78475530b46d0186111a9096b30725f816b55fe
        NSJAIL_VERSION: 3.6
    privileged: true
    security_opt:
      - apparmor=unconfined
    environment:
      XPERT_NSJAIL_RUNNER_TOKEN: ${NSJAIL_RUNNER_TOKEN:?Set NSJAIL_RUNNER_TOKEN before enabling NsJail}
      XPERT_NSJAIL_USE_CGROUP_V2: ${XPERT_NSJAIL_USE_CGROUP_V2:-true}
      XPERT_NSJAIL_WORKSPACE_ROOT: /sandbox
      XPERT_NSJAIL_MAX_RUNTIMES: ${XPERT_NSJAIL_MAX_RUNTIMES:-100}
      XPERT_NSJAIL_RUNTIME_IDLE_TTL_SECONDS: ${XPERT_NSJAIL_RUNTIME_IDLE_TTL_SECONDS:-7200}
      XPERT_NSJAIL_REAPER_INTERVAL_SECONDS: ${XPERT_NSJAIL_REAPER_INTERVAL_SECONDS:-60}
      XPERT_NSJAIL_MAX_SERVICES_PER_RUNTIME: ${XPERT_NSJAIL_MAX_SERVICES_PER_RUNTIME:-16}
      XPERT_NSJAIL_MAX_TERMINALS_PER_RUNTIME: ${XPERT_NSJAIL_MAX_TERMINALS_PER_RUNTIME:-8}
      XPERT_NSJAIL_MAX_EXECUTIONS_GLOBAL: ${XPERT_NSJAIL_MAX_EXECUTIONS_GLOBAL:-32}
      XPERT_NSJAIL_MAX_EXECUTIONS_PER_RUNTIME: ${XPERT_NSJAIL_MAX_EXECUTIONS_PER_RUNTIME:-4}
      XPERT_NSJAIL_MAX_DOWNLOAD_FILES: ${XPERT_NSJAIL_MAX_DOWNLOAD_FILES:-64}
      XPERT_NSJAIL_MAX_DOWNLOAD_BYTES: ${XPERT_NSJAIL_MAX_DOWNLOAD_BYTES:-33554432}
      XPERT_NSJAIL_MAX_SERVICE_LOG_BYTES: ${XPERT_NSJAIL_MAX_SERVICE_LOG_BYTES:-4194304}
      XPERT_NSJAIL_MAX_READY_TEXT_BYTES: ${XPERT_NSJAIL_MAX_READY_TEXT_BYTES:-4096}
      XPERT_NSJAIL_MEMORY_BYTES: ${XPERT_NSJAIL_MEMORY_BYTES:-2147483648}
      XPERT_NSJAIL_SWAP_BYTES: ${XPERT_NSJAIL_SWAP_BYTES:-0}
      XPERT_NSJAIL_CPU_MS_PER_SEC: ${XPERT_NSJAIL_CPU_MS_PER_SEC:-1000}
      XPERT_NSJAIL_PIDS: ${XPERT_NSJAIL_PIDS:-128}
      XPERT_NSJAIL_RLIMIT_AS_MB: ${XPERT_NSJAIL_RLIMIT_AS_MB:-4096}
      XPERT_NSJAIL_RLIMIT_FSIZE_MB: ${XPERT_NSJAIL_RLIMIT_FSIZE_MB:-256}
      XPERT_NSJAIL_RLIMIT_NOFILE: ${XPERT_NSJAIL_RLIMIT_NOFILE:-256}
      XPERT_NSJAIL_UID: ${XPERT_NSJAIL_UID:-1000}
      XPERT_NSJAIL_GID: ${XPERT_NSJAIL_GID:-1000}
    expose:
      - '8090'
    restart: unless-stopped
    volumes:
      - ./docker/volumes/api/sandbox/:/sandbox/
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks:
      - nsjail-control

networks:
  nsjail-control:
    internal: true
