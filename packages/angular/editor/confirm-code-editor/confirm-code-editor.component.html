<div class="cursor-move" cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
  <h4 style="pointer-events: none;">
    {{ 'COMPONENTS.EDITOR.EDIT' | translate: {Default: "Edit"} }}
  </h4>
</div>

<div class="flex flex-col">
  <ngx-monaco-editor class="ngm-confirm__monaco-editor flex-1 h-full"
    [options]="editorOptions"
    [(ngModel)]="statement"
    (onInit)="editor$.next($event)"
  />
</div>

<div class="flex justify-between items-center">
  <div ngmButtonGroup>
    <button z-button zType="ghost" (click)="onReset()">
      {{ 'COMPONENTS.COMMON.RESET' | translate: {Default: 'Reset'} }}
    </button>
    <button z-button zType="ghost" (click)="onClear()">
      {{ 'COMPONENTS.COMMON.CLEAR' | translate: {Default: 'Clear'} }}
    </button>
  </div>
    
  <div ngmButtonGroup>
    <button z-button zType="ghost" (click)="onCancel()">
      {{ 'COMPONENTS.COMMON.CANCEL' | translate: {Default: 'Cancel'} }}
    </button>
    <button class="text-text-accent hover:text-text-accent" z-button zType="ghost" cdkFocusInitial (click)="onApply()">
      {{ 'COMPONENTS.COMMON.APPLY' | translate: {Default: 'Apply'} }}
    </button>
    <button z-button zType="default" cdkFocusInitial (click)="onOk()">
      {{ 'COMPONENTS.COMMON.CONFIRM' | translate: {Default: 'Confirm'} }}
    </button>
  </div>
</div>
