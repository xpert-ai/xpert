<z-form-field fxFlex="100" [appearance]="appearance">
  <z-form-label>Select</z-form-label>
  <ngm-select
    [formControl]="formControl"
    [selectOptions]="(dimensions$ | async)?.map(property => ({ value: property.__id__, label: property.caption || property.name }))">
  </ngm-select>

  <div zFormSuffix>
    <button z-button zType="ghost" zSize="icon" zShape="circle" [matMenuTriggerFor]="operatorMenu" (click)="$event.stopPropagation();$event.preventDefault();">
        <z-icon zType="drag_handle"></z-icon>
    </button>

    <button z-button zType="ghost" zSize="icon" zShape="circle" zFormSuffix [matMenuTriggerFor]="slicerMenu" (click)="$event.stopPropagation();$event.preventDefault();">
        <z-icon zType="more_vert"></z-icon>
    </button>

    <ng-content></ng-content>
  </div>
  
</z-form-field>

<mat-menu #operatorMenu="matMenu" class="ngm-density__compact">
    <button mat-menu-item disableRipple >
      <z-icon zType="dvr"></z-icon>
      <span>Equal</span>
    </button>
    <button mat-menu-item disableRipple >
        <z-icon zType="chevron_left"></z-icon>
        <span>Less than</span>
    </button>

    <button mat-menu-item disableRipple >
        <z-icon zType="first_page"></z-icon>
        <span>Less Equal</span>
    </button>

    <button mat-menu-item disableRipple >
        <z-icon zType="chevron_right"></z-icon>
        <span>Greater than</span>
    </button>
    
    <button mat-menu-item disableRipple >
        <z-icon zType="last_page"></z-icon>
        <span>Greater Equal</span>
    </button>
</mat-menu>

<mat-menu #slicerMenu="matMenu" class="ngm-density__compact">
    <button mat-menu-item disableRipple >
      <z-icon zType="dvr"></z-icon>
      <span>显示为...</span>
    </button>
</mat-menu>
