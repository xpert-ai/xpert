<z-form-field class="flex-1" [appearance]="appearance">
  <z-form-label>
    <span>{{ label }}</span>
  </z-form-label>

  <ngm-select
    [(ngModel)]="type"
    [disabled]="disabled"
    [selectOptions]="compareOptions()"
    [placeholder]="triggerLabel()"
  />

</z-form-field>

<div class="flex-1">
  @if (type !== COMPARE_TO_ENUM.CurrentMember && type !== COMPARE_TO_ENUM.Ancestor && type !== COMPARE_TO_ENUM.SelectedMember) {
    <z-form-field class="w-full" [appearance]="appearance">
      <z-form-label>{{ 'Ngm.Property.NthMember' | translate: {Default: "Value / N'th Member"} }}</z-form-label>
      <input z-input [(ngModel)]="value">
    </z-form-field>
  }
</div>
