<header xpDialogTitle cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
  <h4 style="pointer-events: none">
    {{ 'Ngm.Entity.MeasureFormatting' | translate: { Default: 'Measure Formatting' } }}
  </h4>
</header>

<xp-dialog-content class="">
  <form [formGroup]="formGroup" class="flex flex-col justify-start items-stretch gap-2">
    <z-switch formControlName="shortNumber">
      {{ 'Ngm.Entity.ShortNumber' | translate: { Default: 'Short Number' } }}
    </z-switch>

    <ngm-slider-input
      [label]="'Ngm.Entity.Decimals' | translate: { Default: 'Decimals' }"
      formControlName="decimal"
      color="accent"
      [max]="10"
    >
    </ngm-slider-input>
    <ngm-input
      [label]="'Ngm.Entity.DigitsInfo' | translate: { Default: 'Digits Info' }"
      formControlName="digitsInfo"
    ></ngm-input>
    <ngm-input [label]="'Ngm.Entity.Unit' | translate: { Default: 'Unit' }" formControlName="unit"></ngm-input>

    <!-- 暂不支持 <z-checkbox formControlName="useUnderlyingUnit">
            {{ 'Ngm.Entity.UseUnderlyingUnit' | translate: {Default: "Use Underlying Unit"} }}
        </z-checkbox> -->
  </form>
</xp-dialog-content>

<xp-dialog-actions align="end">
  <div ngmButtonGroup>
    <button z-button zType="ghost" xpDialogClose>
      {{ 'Ngm.Common.Cancel' | translate: { Default: 'Cancel' } }}
    </button>
    <button z-button zType="default" cdkFocusInitial (click)="onApply()">
      {{ 'Ngm.Common.Apply' | translate: { Default: 'Apply' } }}
    </button>
  </div>
</xp-dialog-actions>
