@if (!hiddenIcon() && icon()) {
  <z-icon mat-list-icon class="shrink-0 mr-1" [zSize]="iconSize()" [zType]="icon()"></z-icon>
}

<ngm-display-behaviour class="flex-1 overflow-hidden"
  [displayBehaviour]="displayBehaviour()"
  [option]="{
    key: property().name,
    caption: property().caption
  }"
  [highlight]="highlight()"
/>
