<div class="ngm-property-array__container flex flex-col justify-start items-stretch"
>

  @if (isEmpty) {
    <button z-button zType="ghost" ngmAppearance="dashed" (click)="add()">
      <z-icon zType="playlist_add"></z-icon>
      {{ 'Ngm.Property.ADD_DIMENSION' | translate: {Default: 'Add Dimension'} }}
    </button>
  }

  @for (item of formArray.controls; track i; let i = $index;) {
    <ngm-property-select class="group" cdkDragBoundary=".ngm-property-array__container" 
      [formControl]="$any(item)"
      [dataSettings]="dataSettings"
      [entityType]="entityType"
      [dsCoreService]="dsCoreService"
      [capacities]="capacities"
    >
      <i class="ri-draggable text-lg" ngmPrefix></i>
      <button z-button zType="ghost" zSize="icon" zShape="circle" ngmSuffix class="opacity-0 group-hover:opacity-100 text-text-destructive hover:bg-state-destructive-hover hover:text-text-destructive" displayDensity="compact" (click)="remove(i); $event.stopPropagation(); $event.preventDefault()">
        <z-icon zType="clear"></z-icon>
      </button>
    </ngm-property-select>
  }
</div>

@if (!isEmpty) {
  <button z-button zType="ghost" class="add" ngmAppearance="dashed" (click)="add()">
    <z-icon zType="playlist_add"></z-icon>
    {{ 'Ngm.Property.ADD_DIMENSION' | translate: {Default: 'Add Dimension'} }}
  </button>
}
