<div class="text-lg font-medium mb-4"> {{ 'Ngm.Calculation.MEASURE_CONTROL' | translate: {Default: "Measure Control"} }} </div>

<div>
  <z-form-field appearance="fill">
      <z-form-label>
        {{ 'Ngm.Common.DisplayBehaviour' | translate: {Default: 'Display Behaviour'} }}
      </z-form-label>
      <ngm-select [formControl]="displayBehaviour" [selectOptions]="displayBehaviourOptions" />
  </z-form-field>
</div>

<div class="text-base my-4">
  {{ 'Ngm.Calculation.MeasureSelectOptions' | translate: {Default: 'Measure Select Options'} }}
</div>
<mat-selection-list displayDensity="cosy" cdkDropList (cdkDropListDropped)="drop($event)" class="ngm-cdk__drag-list"
  [(ngModel)]="selectedMeasures"
  (selectionChange)="onSelectionChange($event)">
    <mat-list-option *ngFor="let measure of measures$ | async" [value]="measure.name"
      cdkDrag cdkDragBoundary=".ngm-cdk__drag-list">
      <ngm-property [property]="measure" [displayBehaviour]="displayBehaviour.value" />
    </mat-list-option>
</mat-selection-list>
