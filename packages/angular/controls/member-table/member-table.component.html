@if (options?.searchable) {
  <ngm-search class="ngm-member-table__search shrink-0 my-2" [formControl]="searchControl">
  </ngm-search>
}

<cdk-virtual-scroll-viewport [tvsItemSize]="itemSize">
  <table mat-table [dataSource]="dataSource" [displayDensity]="appearance?.displayDensity">
    <!-- Checkbox Column -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>
        @if (multiple$ | async) {
          <z-checkbox
            (checkChange)="$event ? masterToggle() : null"
            [ngModel]="hasMember() && isAllSelected()"
            [indeterminate]="hasMember() && !isAllSelected()"
            >
          </z-checkbox>
        }
        @if ((multiple$ | async) === false) {
          <span>
            {{ 'Ngm.Common.Select' | translate: { Default: 'Select' } }}
          </span>
        }
      </th>
      <td mat-cell *matCellDef="let row">
        <z-checkbox
          (click)="$event.stopPropagation()"
          (checkChange)="$event ? toggleMember(row) : null"
          [ngModel]="isSelected(row)"
          >
        </z-checkbox>
      </td>
    </ng-container>

    @for (col of columns$ | async; track col) {
      <ng-container [matColumnDef]="col.name">
        <th mat-header-cell *matHeaderCellDef>{{ col.caption || col.name }}</th>
        <td mat-cell *matCellDef="let element">{{ element[col.name] }}</td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns$ | async; sticky: options?.stickyHeader"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns$ | async" (click)="toggleMember(row)"></tr>
  </table>
</cdk-virtual-scroll-viewport>

@if (loading$ | async) {
  <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center">
    <z-loader diameter="30" />
  </div>
}
