<label class="p-1 text-sm text-ellipsis whitespace-nowrap overflow-hidden disabled:opacity-50">
  {{ 'Ngm.TimeFilter.Today' | translate: {Default: "Today"} }}
</label>

<ng-container [ngSwitch]="granularity">
  <ng-container *ngSwitchCase="TimeGranularity.Year">
    <ngm-yearpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
      >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-yearpicker>
  </ng-container>
  <ng-container *ngSwitchCase="TimeGranularity.Quarter">
    <ngm-quarterpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
      >
          <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-quarterpicker>
  </ng-container>
  <ng-container *ngSwitchCase="TimeGranularity.Month">
    <ngm-monthpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
      >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-monthpicker>
  </ng-container>

  <ng-container *ngSwitchDefault>
    <ngm-datepicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
      >
          <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-datepicker>
  </ng-container>
</ng-container>

<z-radio-group [(ngModel)]="granularity">
  <ng-template #granularityMenu>
    <div z-menu-content class="ngm-formly ngm-density__compact">
      <button
        type="button"
        z-menu-item
        class="w-full"
        *ngFor="let value of TIME_GRANULARITY_SEQUENCES[granularitySequence]"
        (click)="$event.stopPropagation()"
      >
        <z-radio [value]="value">
          {{ 'Ngm.TimeFilter.' + value | translate: {Default: value} }}
        </z-radio>
      </button>
    </div>
  </ng-template>
</z-radio-group>
