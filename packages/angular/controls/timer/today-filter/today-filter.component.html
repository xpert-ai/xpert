<label class="p-1 text-sm text-ellipsis whitespace-nowrap overflow-hidden disabled:opacity-50">
  {{ 'Ngm.TimeFilter.Today' | translate: {Default: "Today"} }}
</label>

@switch (granularity) {
  @case (TimeGranularity.Year) {
    <ngm-yearpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
        >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-yearpicker>
  }
  @case (TimeGranularity.Quarter) {
    <ngm-quarterpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
        >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-quarterpicker>
  }
  @case (TimeGranularity.Month) {
    <ngm-monthpicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
        >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-monthpicker>
  }
  @default {
    <ngm-datepicker [formControl]="date">
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        ngmSuffix
        class="ngm-actionable-opacity"
        z-menu
        [zMenuTriggerFor]="granularityMenu"
        (click)="$event.stopPropagation();$event.preventDefault();"
        >
        <z-icon zType="more_vert"></z-icon>
      </button>
    </ngm-datepicker>
  }
}

<z-radio-group [(ngModel)]="granularity">
  <ng-template #granularityMenu>
    <div z-menu-content class="ngm-formly ngm-density__compact">
      @for (value of TIME_GRANULARITY_SEQUENCES[granularitySequence]; track value) {
        <button
          type="button"
          z-menu-item
          class="w-full"
          (click)="$event.stopPropagation()"
          >
          <z-radio [value]="value">
            {{ 'Ngm.TimeFilter.' + value | translate: {Default: value} }}
          </z-radio>
        </button>
      }
    </div>
  </ng-template>
</z-radio-group>
