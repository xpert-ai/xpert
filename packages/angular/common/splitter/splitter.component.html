<ng-content select="ngm-splitter-pane"></ng-content>
@for (pane of panes; track pane; let last = $last; let index = $index) {
  @if (!last) {
    <ngm-splitter-bar [order]='pane.order + 1' role='separator'
      [type]="type"
      [pane]="pane"
      [siblings]='getPaneSiblingsByOrder(pane.order + 1, index)'
      (moveStart)="onMoveStart($event)"
      (moving)="onMoving($event)">
    </ngm-splitter-bar>
  }
}
