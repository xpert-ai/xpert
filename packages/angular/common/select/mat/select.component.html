<z-form-field class="w-full flex-1 group" [appearance]="appearance" [displayDensity]="displayDensity">
  <z-form-label>{{ label }}</z-form-label>
  <input type="text" [placeholder]="placeholder" z-input [formControl]="formControl" [matAutocomplete]="auto" />

  <mat-autocomplete
    autoActiveFirstOption
    #auto="matAutocomplete"
    class="ngm-select__autocomplete-panel"
    [class]="
      (multiple ? 'multiple' : '') +
      ' ' +
      (displayDensity === 'compact' ? 'ngm-density__compact' : '') +
      ' ' +
      (displayDensity === 'cosy' ? 'ngm-density__cosy' : '')
    "
    [displayWith]="displayWith"
    >
    @if (virtualScroll) {
      <cdk-virtual-scroll-viewport
        [itemSize]="virtualScrollItemSize"
        minBufferPx="200"
        maxBufferPx="400"
        class="ngm-select-form-field__viewport"
        >
        <mat-option *cdkVirtualFor="let option of options$ | async" [value]="option" class="flex items-center">
          @if (multiple) {
            <z-checkbox
              [ngModel]="isSelect(option)"
              (click)="$event.stopPropagation()"
              (checkChange)="onSelect($event, option)"
              >
              <ngm-display-behaviour
                [option]="option"
                [displayBehaviour]="displayBehaviour"
                [highlight]="highlight"
              ></ngm-display-behaviour>
            </z-checkbox>
          }
          @if (!multiple) {
            <ngm-display-behaviour
              class="flex-1"
              [option]="option"
              [displayBehaviour]="displayBehaviour"
              [highlight]="highlight"
            ></ngm-display-behaviour>
          }
        </mat-option>
      </cdk-virtual-scroll-viewport>
    } @else {
      @for (option of options$ | async; track option) {
        <mat-option [value]="option" class="flex items-center">
          @if (multiple) {
            <z-checkbox
              [ngModel]="isSelect(option)"
              (click)="$event.stopPropagation()"
              (checkChange)="onSelect($event, option)"
              >
              <ngm-display-behaviour
                [option]="option"
                [displayBehaviour]="displayBehaviour"
                [highlight]="highlight"
              ></ngm-display-behaviour>
            </z-checkbox>
          }
          @if (!multiple) {
            <ngm-display-behaviour
              class="flex-1"
              [option]="option"
              [displayBehaviour]="displayBehaviour"
              [highlight]="highlight"
            ></ngm-display-behaviour>
          }
        </mat-option>
      }
    }

  </mat-autocomplete>

  <div zFormSuffix class="flex items-center">
    @if (isNotInitial) {
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        class="opacity-0 group-hover:opacity-100"
        [zDisabled]="formControl.disabled"
        ngmAppearance="danger"
        (click)="clear()"
        >
        <z-icon zType="close"></z-icon>
      </button>
    }
    @if (loading()) {
      <z-loader class="m-2" diameter="24" />
    }
  </div>

  @if (formControl.invalid) {
    <z-form-message zType="error">{{ getErrorMessage() }}</z-form-message>
  }
</z-form-field>
