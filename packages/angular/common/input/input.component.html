<z-form-field class="w-full p-0">
  @if (label()) {
    <z-form-label class="ngm-input-label shrink-0" [title]="label()" [zRequired]="required()">
      {{ label() }}
    </z-form-label>
  }
  <ng-content select="[ngmLabel]"></ng-content>

  <z-form-control>
    @if (hasOptions()) {
      <z-combobox
        zTriggerMode="input"
        class="ngm-input-element ngm-w-full"
        [value]="value"
        [options]="comboboxOptions()"
        [placeholder]="placeholder()"
        [disabled]="disabled() || _disabled()"
        [allowCustomValue]="true"
        [zSearchTerm]="searchTerm()"
        [zDisplayWith]="displayValue"
        [zFilterWith]="filterOption"
        (zValueChange)="onOptionSelected($event)"
        (zSearchTermChange)="onSearchTermChange($event)"
        (zBlur)="blur.emit($event)"
        (zFocus)="focus.emit($event)"
      >
        <ng-template zComboboxOption let-option let-searchTerm="searchTerm">
          @if (_explicitContent) {
            <ng-container
              *ngTemplateOutlet="
                _explicitContent;
                context: {
                  $implicit: option.data,
                  value: option.data?.value,
                  caption: option.data?.caption,
                  key: option.data?.key
                }
              "
            ></ng-container>
          } @else {
            <span [ngmHighlight]="searchTerm" [content]="option.label || option.value"></span>
          }
        </ng-template>
      </z-combobox>
    } @else {
      <input z-input class="ngm-input-element ngm-w-full"
        [type]="type() || 'text'"
        [value]="defaultValue"
        [placeholder]="placeholder()"
        [ngModel]="value"
        (ngModelChange)="onChange($event)"
        [disabled]="disabled() || _disabled()"
        (blur)="blur.emit($event)"
        (focus)="focus.emit($event)"
      >
    }

    <div class="absolute right-0 top-0 h-full flex items-center">
      <ng-content select="[ngmSuffix]"></ng-content>
    </div>
  </z-form-control>

  @if (!simple()) {
    <z-form-message zType="error" class="ngm-input__message text-xs h-4">
      <ng-content select="[ngmError]"></ng-content>
    </z-form-message>
  }
</z-form-field>
