<z-form-field class="w-full" [appearance]="appearance">
  @if (label) {
    <z-form-label>{{ label }}</z-form-label>
  }

  <z-combobox
    [formControl]="formControl"
    [options]="noneOption()"
    [groups]="groups()"
    [placeholder]="label || ('Ngm.Common.None' | translate: { Default: 'None' })"
  />

  @if (error()) {
    <z-form-message zType="error">
      <span class="text-xs h-4">{{ error() }}</span>
    </z-form-message>
  }
</z-form-field>
