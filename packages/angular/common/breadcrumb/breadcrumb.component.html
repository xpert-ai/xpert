<nav z-tab-nav-bar disableRipple class="breadcrumb" headerPosition="above" stretchTabs="false" alignTabs="start">
  @for (step of steps; track step; let i = $index; let first = $first; let last = $last) {
    <div z-tab-link class="breadcrumb__step"
      [ngClass]="{
        'breadcrumb__step--active': step.active,
        'first': first,
        'last': last
      }"
      (click)="activeLink = step;onClick(step)"
    >
      {{step.label}}
    </div>
  }
</nav>

<button z-button zType="ghost" zSize="icon" zShape="circle" displayDensity="compact" [matTooltip]="'Ngm.Common.ClearDrillDown' | translate: {Default: 'Clear Drill Down'}" matTooltipPosition="above" (click)="onClose()">
  <mat-icon fontSet="material-icons-outlined">close</mat-icon>
</button>
