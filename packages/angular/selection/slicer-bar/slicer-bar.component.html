<header xpDialogTitle cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
  <h4 style="pointer-events: none;">
    {{ 'Ngm.Selection.Slicers' | translate: {Default: "Slicers"} }}
  </h4>
</header>

<xp-dialog-content class="">
  <ng-container *ngFor="let slicer of slicers$ | async; index as i">
    <ngm-slicer [slicer]="slicer"
      [dataSettings]="dataSettings"
      [entityType]="entityType"
      [editable]="editable()"
      (slicerChange)="update($event, i)"
      (removed)="remove(i)">
    </ngm-slicer>
    <z-divider></z-divider>
  </ng-container>
</xp-dialog-content>

<xp-dialog-actions style="display: flex; justify-content: space-between; align-items: center;">
  <button z-button zType="ghost" color="primary" ngmAppearance="dashed" z-menu [zMenuTriggerFor]="menu">
    <z-icon zType="add"></z-icon>
    {{ 'Ngm.Common.ADD' | translate: {Default: "Add"} }}
  </button>

  <div ngmButtonGroup>
    <button z-button zType="ghost" xpDialogClose cdkFocusInitial>
      {{ 'Ngm.Common.Cancel' | translate: {Default: 'Cancel'} }}
    </button>
    <button z-button zType="default" color="accent" cdkFocusInitial [xpDialogClose]="slicers">
      {{ 'Ngm.Common.Apply' | translate: {Default: 'Apply'} }}
    </button>
  </div>
</xp-dialog-actions>

<ng-template #menu>
  <div z-menu-content class="ngm-density__compact">
    <div class="px-1" (click)="$event.stopPropagation()">
      <ngm-search [formControl]="searchControl"></ngm-search>
    </div>

    <ng-container *ngFor="let property of dimensions$ | async">
      <button
        *ngIf="isSemanticCalendar(property); else menuItem"
        type="button"
        z-menu-item
        z-menu
        [zMenuTriggerFor]="calendarMenu"
        [zMenuTriggerData]="{property: property}"
        (click)="openSlicerCreator(property)"
      >
        <ngm-entity-property
          class="flex-1"
          [property]="property"
          [displayBehaviour]="DisplayBehaviour.auto"
          [highlight]="highlight"
        >
        </ngm-entity-property>
        <z-icon class="ml-auto opacity-60" zType="chevron_right"></z-icon>
      </button>

      <ng-template #menuItem>
        <button type="button" z-menu-item (click)="openValueHelp(property)">
          <ngm-entity-property
            class="flex-1"
            [property]="property"
            [displayBehaviour]="DisplayBehaviour.auto"
            [highlight]="highlight"
          >
          </ngm-entity-property>
        </button>
      </ng-template>
    </ng-container>

    <button
      *ngIf="showCombinationSlicer"
      type="button"
      z-menu-item
      (click)="$event.preventDefault();openSlicerCreator(SlicersCapacity.CombinationSlicer)"
    >
      <z-icon zType="tune"></z-icon>
      {{ 'Ngm.Selection.CombinationSlicer' | translate: {Default: 'Combination Slicer'} }}
    </button>

    <button
      *ngIf="showAdvancedSlicer"
      type="button"
      z-menu-item
      (click)="$event.preventDefault();openSlicerCreator(SlicersCapacity.AdvancedSlicer)"
    >
      <z-icon zType="data_array"></z-icon>
      {{ 'Ngm.Selection.AdvancedSlicer' | translate: {Default: 'Advanced Slicer'} }}
    </button>
  </div>
</ng-template>

<ng-template #calendarMenu let-property="property">
  <div z-menu-content class="ngm-density__compact">
    <button type="button" z-menu-item (click)="openValueHelp(property)">
      <z-icon zType="people_outline"></z-icon>
      {{ 'Ngm.Selection.DimensionMembers' | translate: {Default: 'Dimension Members'} }}
    </button>

    <button
      type="button"
      z-menu-item
      *ngFor="let variable of dateVariables"
      (click)="openDynamicDateHelp(property, variable.dateRange)"
    >
      {{variable.name}}
    </button>
  </div>
</ng-template>
