<header xpDialogTitle cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
  <h4 style="pointer-events: none">
    {{ 'Ngm.AdvancedSlicer.TITLE' | translate: { Default: 'Advanced Slicer' } }}
  </h4>
</header>

<xp-dialog-content class="">
  <form [formGroup]="formGroup" class="flex flex-col justify-start items-stretch gap-2">
    <div>{{ 'Ngm.AdvancedSlicer.CONTEXT' | translate: { Default: 'Context' } }}</div>

    <ngm-property-array
      class="ngm-advanced-slicer__context"
      formControlName="context"
      [dataSettings]="dataSettings"
      [entityType]="entityType$ | async"
      [capacities]="[PropertyCapacity.Dimension]"
    ></ngm-property-array>

    <ngm-select
      formControlName="operator"
      [label]="'Ngm.AdvancedSlicer.OPERATOR' | translate: { Default: 'Operator' }"
      [selectOptions]="advancedSlicerOperators()"
    >
      <ng-template ngmOptionContent let-operator>
        <ngm-display-behaviour
          class="flex-1"
          [option]="operator"
          [displayBehaviour]="DisplayBehaviour.auto"
        ></ngm-display-behaviour>
      </ng-template>
      <z-switch ngmSuffix *ngIf="hasOther()" formControlName="other" (click)="$event.stopPropagation()">
        {{ 'Ngm.AdvancedSlicer.ENABLE_OTHER' | translate: { Default: 'Enable Other' } }}
      </z-switch>
    </ngm-select>

    <div class="flex justify-start items-center gap-2" formArrayName="value">
      <ngm-parameter-select
        [label]="
          to()
            ? ('Ngm.AdvancedSlicer.VALUE_FROM' | translate: { Default: 'From' })
            : ('Ngm.AdvancedSlicer.VALUE' | translate: { Default: 'Value' })
        "
        [dataSettings]="dataSettings"
        [entityType]="entityType$ | async"
        formControlName="0"
      >
      </ngm-parameter-select>
      <ngm-parameter-select
        *ngIf="to()"
        [label]="'Ngm.AdvancedSlicer.VALUE_TO' | translate: { Default: 'To' }"
        [dataSettings]="dataSettings"
        [entityType]="entityType$ | async"
        formControlName="1"
      >
      </ngm-parameter-select>
    </div>

    <ngm-measure-select
      searchable
      formControlName="measure"
      [label]="'Ngm.AdvancedSlicer.MEASURE' | translate: { Default: 'Measure' }"
      [placeholder]="
        'Ngm.AdvancedSlicer.MeasureSelectPlaceholder' | translate: { Default: 'select or create a measure' }
      "
      [dataSettings]="dataSettings"
    >
    </ngm-measure-select>
  </form>
</xp-dialog-content>

<xp-dialog-actions>
  <button z-button zType="ghost">
    {{ 'Ngm.Common.Reset' | translate: { Default: 'Reset' } }}
  </button>

  <div ngmButtonGroup>
    <button z-button zType="ghost" xpDialogClose>
      {{ 'Ngm.Common.Cancel' | translate: { Default: 'Cancel' } }}
    </button>
    <button z-button zType="default" color="accent" (click)="onApply()" cdkFocusInitial>
      {{ 'Ngm.Common.Apply' | translate: { Default: 'Apply' } }}
    </button>
  </div>
</xp-dialog-actions>
