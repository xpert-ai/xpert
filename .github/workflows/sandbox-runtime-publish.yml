name: Publish Sandbox Runtime images

on:
  pull_request:
    paths:
      - 'packages/sandbox-runtime/**'
      - 'packages/server-ai/src/sandbox/sandbox-job/runtime-definitions/**'
  push:
    branches:
      - develop
    tags:
      - '*'
    paths:
      - 'packages/sandbox-runtime/**'
      - 'packages/server-ai/src/sandbox/sandbox-job/runtime-definitions/**'
  workflow_dispatch:
    inputs:
      publish_candidate:
        description: Push develop-candidate and sha-<commit> aliases after smoke tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare Sandbox Runtime images
    if: github.repository == 'xpert-ai/xpert'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.matrix.outputs.changed }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select image families
        id: matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            matrix=$(node packages/sandbox-runtime/scripts/build-matrix.mjs --changed-from "${{ github.event.pull_request.base.sha }}")
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            matrix=$(node packages/sandbox-runtime/scripts/build-matrix.mjs --changed-from "${{ github.event.before }}")
          else
            matrix=$(node packages/sandbox-runtime/scripts/build-matrix.mjs)
          fi
          count=$(jq '.include | length' <<< "$matrix")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          [[ "$count" -gt 0 ]] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Verify Runtime Suite catalog
        if: steps.matrix.outputs.changed == 'true'
        run: node packages/sandbox-runtime/scripts/verify-catalog.mjs

  verify:
    name: Verify Sandbox Runtime / ${{ matrix.family }}
    needs: prepare
    if: >-
      needs.prepare.outputs.changed == 'true' &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_candidate != true)
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image family
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: docker buildx build --platform linux/amd64 --load --file "${{ matrix.dockerfile }}" --tag "$LOCAL_IMAGE" .

      - name: Smoke test image
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: node packages/sandbox-runtime/scripts/verify-image.mjs --family "${{ matrix.family }}" --image "$LOCAL_IMAGE"

  publish-candidate:
    name: Publish Sandbox Runtime candidate / ${{ matrix.family }}
    needs: prepare
    if: >-
      needs.prepare.outputs.changed == 'true' &&
      (
        github.ref == 'refs/heads/develop' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_candidate == true)
      )
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image family
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: docker buildx build --platform linux/amd64 --load --file "${{ matrix.dockerfile }}" --tag "$LOCAL_IMAGE" .

      - name: Smoke test image before publishing
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: node packages/sandbox-runtime/scripts/verify-image.mjs --family "${{ matrix.family }}" --image "$LOCAL_IMAGE"

      - name: Push candidate aliases
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
          REPOSITORIES: ${{ toJSON(matrix.repositories) }}
        shell: bash
        run: |
          for repository in $(jq -r '.[]' <<< "$REPOSITORIES"); do
            for tag in develop-candidate "sha-${{ github.sha }}"; do
              docker tag "$LOCAL_IMAGE" "$repository:$tag"
              docker push "$repository:$tag"
            done
          done

  alias-platform-release:
    name: Alias Runtime Suite / ${{ matrix.family }}
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/') && needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create platform-version aliases without rebuilding
        env:
          REPOSITORIES: ${{ toJSON(matrix.repositories) }}
          VERSION_TAG: ${{ matrix.versionTag }}
          PLATFORM_TAG: xpert-${{ github.ref_name }}
        shell: bash
        run: |
          for repository in $(jq -r '.[]' <<< "$REPOSITORIES"); do
            source="$repository:$VERSION_TAG"
            target="$repository:$PLATFORM_TAG"
            docker buildx imagetools inspect "$source" >/dev/null
            docker buildx imagetools create --tag "$target" "$source"
          done
