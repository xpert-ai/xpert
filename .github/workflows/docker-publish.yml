name: Publish Docker images

on:
  push:
    branches:
      - develop
      - main
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.service.image_name }}
    if: github.repository == 'xpert-ai/xpert' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - dockerfile: .deploy/api/Dockerfile
            image_name: xpert-api
            node_options: --max-old-space-size=4096
          - dockerfile: .deploy/webapp/Dockerfile
            image_name: xpert-webapp
            node_options: --max-old-space-size=4096
    env:
      DOCKER_TARGET: ${{ github.ref == 'refs/heads/develop' && 'candidate' || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image_name }}
            metadc/${{ matrix.service.image_name }}
            registry.cn-hangzhou.aliyuncs.com/metad/${{ matrix.service.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=develop-candidate,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          target: ${{ env.DOCKER_TARGET }}
          build-args: |
            NODE_OPTIONS=${{ matrix.service.node_options }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=inline
