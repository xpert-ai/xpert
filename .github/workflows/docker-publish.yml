name: Publish Application Docker images

on:
  pull_request:
    paths:
      - '.deploy/nsjail-runner/**'
      - '.github/workflows/docker-publish.yml'
      - 'package.json'
  push:
    branches:
      - develop
      - main
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.service.image_name }}
    if: github.repository == 'xpert-ai/xpert' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - dockerfile: .deploy/api/Dockerfile
            image_name: xpert-api
            node_options: --max-old-space-size=4096
          - dockerfile: .deploy/webapp/Dockerfile
            image_name: xpert-webapp
            node_options: --max-old-space-size=4096
    env:
      DOCKER_TARGET: ${{ github.ref == 'refs/heads/develop' && 'candidate' || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image_name }}
            metadc/${{ matrix.service.image_name }}
            registry.cn-hangzhou.aliyuncs.com/metad/${{ matrix.service.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=develop-candidate,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          target: ${{ env.DOCKER_TARGET }}
          build-args: |
            NODE_OPTIONS=${{ matrix.service.node_options }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=inline

  validate-nsjail-runner:
    name: Validate xpert-nsjail-runner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Runner unit tests
        run: corepack pnpm run test:nsjail-runner

      - name: Build Runner for the isolation probe
        run: docker build --file .deploy/nsjail-runner/Dockerfile --tag xpert-nsjail-runner:ci .

      - name: Run Runner isolation probe
        shell: bash
        run: |
          workspace="$(mktemp -d)"
          token="$(openssl rand -hex 32)"
          echo "RUNNER_WORKSPACE=$workspace" >> "$GITHUB_ENV"
          docker run --detach \
            --name xpert-nsjail-runner-ci \
            --privileged \
            --cgroupns=host \
            --security-opt apparmor=unconfined \
            --env XPERT_NSJAIL_RUNNER_TOKEN="$token" \
            --env XPERT_NSJAIL_MEMORY_BYTES=134217728 \
            --env XPERT_NSJAIL_CPU_MS_PER_SEC=200 \
            --env XPERT_NSJAIL_PIDS=32 \
            --env XPERT_NSJAIL_RLIMIT_AS_MB=512 \
            --env XPERT_NSJAIL_RLIMIT_FSIZE_MB=2 \
            --env XPERT_NSJAIL_RLIMIT_NOFILE=64 \
            --volume "$workspace:/sandbox" \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            xpert-nsjail-runner:ci
          for attempt in {1..30}; do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' xpert-nsjail-runner-ci)"
            [[ "$status" == healthy ]] && break
            [[ "$status" == unhealthy ]] && exit 1
            sleep 1
          done
          [[ "$(docker inspect --format '{{.State.Health.Status}}' xpert-nsjail-runner-ci)" == healthy ]]
          docker exec xpert-nsjail-runner-ci python3 /app/poc_validate.py

      - name: Clean up Runner isolation probe
        if: always()
        run: |
          docker rm --force xpert-nsjail-runner-ci >/dev/null 2>&1 || true
          [[ -z "${RUNNER_WORKSPACE:-}" ]] || rm -rf "$RUNNER_WORKSPACE"

  publish-nsjail-runner:
    name: Publish xpert-nsjail-runner
    needs: validate-nsjail-runner
    if: github.repository == 'xpert-ai/xpert' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute Runner image metadata
        id: nsjail-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/xpert-nsjail-runner
            metadc/xpert-nsjail-runner
            registry.cn-hangzhou.aliyuncs.com/metad/xpert-nsjail-runner
          flavor: |
            latest=false
          tags: |
            type=raw,value=develop-candidate,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .deploy/nsjail-runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.nsjail-meta.outputs.tags }}
          labels: ${{ steps.nsjail-meta.outputs.labels }}
          cache-to: type=inline

  prepare-sandbox-runtime:
    name: Prepare Sandbox Runtime images
    if: github.repository == 'xpert-ai/xpert' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.matrix.outputs.changed }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select changed image families
        id: matrix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            matrix=$(node packages/sandbox-runtime/scripts/build-matrix.mjs)
          else
            matrix=$(node packages/sandbox-runtime/scripts/build-matrix.mjs --changed-from "${{ github.event.before }}")
          fi
          count=$(jq '.include | length' <<< "$matrix")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          [[ "$count" -gt 0 ]] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Verify Runtime Suite catalog
        if: steps.matrix.outputs.changed == 'true'
        run: node packages/sandbox-runtime/scripts/verify-catalog.mjs

  publish-sandbox-runtime-candidate:
    name: Publish Sandbox Runtime candidate / ${{ matrix.family }}
    needs: prepare-sandbox-runtime
    if: github.ref == 'refs/heads/develop' && needs.prepare-sandbox-runtime.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-sandbox-runtime.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build changed image family
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: docker buildx build --platform linux/amd64 --load --file "${{ matrix.dockerfile }}" --tag "$LOCAL_IMAGE" .

      - name: Smoke test candidate before publishing
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
        run: node packages/sandbox-runtime/scripts/verify-image.mjs --family "${{ matrix.family }}" --image "$LOCAL_IMAGE"

      - name: Push candidate aliases
        env:
          LOCAL_IMAGE: xpert-sandbox-runtime-${{ matrix.family }}:${{ github.sha }}
          REPOSITORIES: ${{ toJSON(matrix.repositories) }}
        shell: bash
        run: |
          for repository in $(jq -r '.[]' <<< "$REPOSITORIES"); do
            for tag in develop-candidate "sha-${{ github.sha }}"; do
              docker tag "$LOCAL_IMAGE" "$repository:$tag"
              docker push "$repository:$tag"
            done
          done

  alias-sandbox-runtime-platform-release:
    name: Alias Runtime Suite / ${{ matrix.family }}
    needs: prepare-sandbox-runtime
    if: startsWith(github.ref, 'refs/tags/') && needs.prepare-sandbox-runtime.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-sandbox-runtime.outputs.matrix) }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create platform-version aliases without rebuilding
        env:
          REPOSITORIES: ${{ toJSON(matrix.repositories) }}
          VERSION_TAG: ${{ matrix.versionTag }}
          PLATFORM_TAG: xpert-${{ github.ref_name }}
        shell: bash
        run: |
          for repository in $(jq -r '.[]' <<< "$REPOSITORIES"); do
            source="$repository:$VERSION_TAG"
            target="$repository:$PLATFORM_TAG"
            docker buildx imagetools inspect "$source" >/dev/null
            docker buildx imagetools create --tag "$target" "$source"
          done
