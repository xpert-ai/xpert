@if (_widget()) {
  <ngm-story-widget class="pac-story-widget-viewer w-full h-full"
    [key]="_widget().key"
    [editable]="false"
    [standalone]="true"
  ></ngm-story-widget>
}

@if (error$ | async; as error) {
  <div>
    {{error | json}}
  </div>
}

@if (widget()) {
  <a class="absolute right-1 bottom-0 z-10" href="/">
    {{'@'}}{{ widget().createdBy | createdBy }}
  </a>
}
