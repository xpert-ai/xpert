<ngx-monaco-editor
  class="code-editor w-full max-h-full min-h-[100px]"
  [class.code-editor--readonly]="isReadonly()"
  [attr.aria-readonly]="isReadonly()"
  ngmResizable
  [directions]="['bottom']"
  [options]="editorOptions()"
  [ngModel]="value$()"
  (ngModelChange)="onEditorChange($event)"
  (resized)="onResized()"
  (onInit)="onInit($event)"
/>
