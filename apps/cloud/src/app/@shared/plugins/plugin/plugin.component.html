@if (plugin(); as plugin) {
  <div
    class="relative overflow-hidden rounded-xl border-[0.5px] border-components-panel-border bg-background-default-subtle shadow-sm hover:shadow-md hover:bg-components-card-bg"
  >
    <div class="p-4 pb-3">
        <div
        class="absolute right-3 top-3 max-w-[45%] truncate rounded-md border-[0.5px] border-divider-subtle bg-components-card-bg px-2 py-0.5 text-xs font-semibold font-body uppercase leading-5 text-text-tertiary shadow-xs"
        >
          {{ 'PAC.Plugin.Category_' + plugin.category | translate: { Default: plugin.category } }}
        </div>
      <div class="flex">
        <div class="relative flex">
          <xp-icon
            [icon]="plugin.icon"
            size="24"
            class="flex h-10 w-10 items-center justify-center overflow-hidden rounded-xl"
          />
          @if (installed()) {
            <div
              class="flex justify-center items-center gap-2 absolute bottom-[-4px] right-[-4px] w-[18px] h-[18px] rounded-full border-2 border-solid border-components-panel-bg bg-components-panel-bg"
            >
              <i class="ri-checkbox-circle-fill text-lg text-text-success"></i>
            </div>
          }
        </div>

        <div class="ml-3 w-0 grow pr-24">
          <div class="flex h-5 items-center">
            <div
              class="system-md-semibold truncate text-text-secondary"
              [class]="plugin.deprecated ? 'line-through decoration-2 decoration-current' : ''"
            >
              {{ plugin.displayName | i18n }}
            </div>
            @if (plugin.deprecated) {
              <i
                class="ri-alert-line ml-1 shrink-0 text-text-warning"
                [zTooltip]="
                  plugin.deprecationMessage
                    ? (plugin.deprecationMessage | i18n)
                    : ('PAC.Plugin.DeprecatedPlugin'
                      | translate
                        : {
                            Default:
                              'This plugin is deprecated. Use the built-in feature or a replacement plugin instead.'
                          })
                "
                zPosition="top"
              ></i>
            }
            <div class="flex shrink-0 items-center justify-center text-text-success ml-1">
              <i class="ri-verified-badge-fill"></i>
            </div>
            <ng-content select="[version]"></ng-content>
          </div>
          <div class="flex h-4 items-center space-x-0.5 mt-0.5">
            <a
              [href]="plugin.author.url"
              target="_blank"
              class="system-xs-regular shrink-0 hover:underline text-text-tertiary"
              >{{ plugin.author.name }}</a
            >
            <span class="system-xs-regular shrink-0 text-text-quaternary">/</span>
            <span class="system-xs-regular w-0 shrink-0 grow truncate text-text-tertiary">{{ plugin.name }}</span>
          </div>
        </div>
      </div>
      <div class="system-xs-regular text-text-tertiary line-clamp-2 mt-2 h-10">
        {{ plugin.description | i18n }}
      </div>

      <ng-content></ng-content>
    </div>
  </div>
}
