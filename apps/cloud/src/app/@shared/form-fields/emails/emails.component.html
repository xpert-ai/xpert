<z-form-field class="w-full" [appearance]="appearance">
  <z-form-label>{{ label }}</z-form-label>

  <mat-chip-grid #chipGrid [attr.aria-label]="label" multiple [formControl]="formControl">
    @for (keyword of keywords; track keyword) {
      <mat-chip-row
        [value]="keyword"
        [removable]="removable"
        (removed)="removeKeyword(keyword)"
        >{{keyword}}
        @if (removable) {
          <button matChipRemove>
            <z-icon zType="cancel"></z-icon>
          </button>
        }
      </mat-chip-row>
    }
  </mat-chip-grid>

  <input
    [placeholder]="placeholder"
    [matChipInputFor]="chipGrid"
    [matChipInputAddOnBlur]="addOnBlur"
    (matChipInputTokenEnd)="addKeywordFromInput($event)"
    >
</z-form-field>
