<z-form-field class="w-full" [appearance]="appearance">
  <z-form-label>{{ label }}</z-form-label>
  <z-tag-select
    mode="tags"
    [value]="keywords"
    [allowCreate]="true"
    [enableSuggestions]="false"
    [addOnBlur]="true"
    [clearable]="true"
    [tokenSeparators]="[',', ';', '\n']"
    [placeholder]="placeholder ?? ('FORM.PLACEHOLDERS.EMAILS_EMPTY_HINT' | translate: { Default: 'Add emails' })"
    (valueChange)="onValueChange($event)"
  />
</z-form-field>
