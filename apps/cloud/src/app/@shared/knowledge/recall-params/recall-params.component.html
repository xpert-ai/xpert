<div class="flex justify-between items-center">
  <div class="flex items-center h-6">
    <div class="font-semibold uppercase text-sm text-text-primary">
      {{ 'PAC.Knowledgebase.RecallParams' | translate: { Default: 'Recall Params' } }}
    </div>
  </div>
</div>

<div class="border-b border-solid border-divider-regular my-2"></div>

<div class="flex items-center justify-between">
  <div class="flex items-center h-6">
    <span class="mr-1 text-text-secondary system-sm-semibold">Top K</span>
    <div
      class="shrink-0 text-text-tertiary hover:text-text-secondary"
      [zTooltip]="
        'PAC.Knowledgebase.TopKTooltip'
          | translate: { Default: 'Used to filter text chunks that are most similar to user questions.' }
      "
      zPosition="top"
    >
      <i class="ri-question-line"></i>
    </div>
  </div>
</div>
<div class="mt-1 flex items-center">
  <div class="mr-3 flex shrink-0 items-center">
    <div class="flex">
      <div class="relative w-full">
        <input
          class="xp-input w-[72px]"
          step="10"
          max="1000"
          min="0"
          type="number"
          [ngModel]="topK()"
          (ngModelChange)="update({ topK: $event })"
        />
      </div>
    </div>
  </div>
  <div class="flex items-center grow">
    <z-slider
      class="w-full"
      [max]="1000"
      [min]="0"
      [step]="10"
      [showTickMarks]="true"
      [showValueLabel]="true"
      [ngModel]="topK()"
      (changeEnd)="update({ topK: sliderValue($event) })"
    ></z-slider>
  </div>
</div>

<div class="flex items-center justify-between">
  <div class="flex items-center h-6">
    <span class="mr-1 text-text-secondary system-sm-semibold"
      >Score {{ 'PAC.Knowledgebase.Threshold' | translate: { Default: 'Threshold' } }}</span
    >
    <div
      class="shrink-0 text-text-tertiary hover:text-text-secondary"
      [zTooltip]="
        'PAC.Knowledgebase.ScoreTooltip'
          | translate: { Default: 'Used to set the similarity threshold for text chunk filtering.' }
      "
      zPosition="top"
    >
      <i class="ri-question-line"></i>
    </div>
  </div>
</div>
<div class="mt-1 flex items-center">
  <div class="mr-3 flex shrink-0 items-center">
    <div class="flex">
      <div class="relative w-full">
        <input
          class="xp-input w-[72px]"
          step="0.05"
          max="1"
          min="0.05"
          type="number"
          [ngModel]="score()"
          (ngModelChange)="update({ score: $event })"
        />
      </div>
    </div>
  </div>
  <div class="flex items-center grow">
    <z-slider
      class="w-full"
      [max]="1"
      [min]="0.05"
      [step]="0.05"
      [showTickMarks]="true"
      [showValueLabel]="true"
      [ngModel]="score()"
      (changeEnd)="update({ score: sliderValue($event) })"
    ></z-slider>
  </div>
</div>

@if (enableWeight()) {
  <div class="flex items-center justify-between">
    <div class="flex items-center h-6">
      <span class="mr-1 text-text-secondary system-sm-semibold">{{
        'PAC.Knowledgebase.Weight' | translate: { Default: 'Weight' }
      }}</span>
      <div
        class="shrink-0 text-text-tertiary hover:text-text-secondary"
        [zTooltip]="
          'PAC.Knowledgebase.WeightTooltip'
            | translate: { Default: 'Weight in the combination of multiple knowledgebases.' }
        "
        zPosition="top"
      >
        <i class="ri-question-line"></i>
      </div>
    </div>
  </div>
  <div class="mt-1 flex items-center">
    <div class="mr-3 flex shrink-0 items-center">
      <div class="flex">
        <div class="relative w-full">
          <input
            class="xp-input w-[72px]"
            step="0.1"
            max="1"
            min="0"
            type="number"
            tabindex="-1"
            [ngModel]="weight()"
            (ngModelChange)="update({ weight: $event })"
          />
        </div>
      </div>
    </div>
    <div class="flex items-center grow">
      <z-slider
        class="w-full"
        [max]="1"
        [min]="0"
        [step]="0.1"
        [showTickMarks]="true"
        [showValueLabel]="true"
        [ngModel]="weight()"
        (changeEnd)="update({ weight: sliderValue($event) })"
      ></z-slider>
    </div>
  </div>
}
