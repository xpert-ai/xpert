<z-form-field class="w-full" [appearance]="appearance">
	<z-form-label>{{ (label || 'FORM.LABELS.ROLE') | translate }}</z-form-label>
	<ngm-select
		[ngModel]="roleId"
		[ngModelOptions]="{ standalone: true }"
		[placeholder]="placeholder"
		[selectOptions]="roleOptions"
		(ngModelChange)="onRoleIdChange($event)"
	/>
</z-form-field>
