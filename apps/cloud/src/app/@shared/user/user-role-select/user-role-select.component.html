<header cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle class="w-full cursor-pointer text-xl text-text-primary font-medium mb-4">
  {{ 'PAC.MENU.AddUsers' | translate: {Default: 'Add Users'} }}
</header>

<div class="flex flex-col py-4">
  <z-form-field appearance="fill" color="accent">
    <z-form-label>{{ 'PAC.KEY_WORDS.Users' | translate: {Default: 'Users'} }}</z-form-label>
    <z-tag-select
      mode="multiple"
      [value]="users"
      [options]="(userOptions$ | async) ?? []"
      [enableSuggestions]="true"
      [searchable]="true"
      [compareWith]="compareUsers"
      [displayWith]="displayUser"
      [placeholder]="'PAC.SHARED.User.NameEmail' | translate: {Default: 'Name,Email'}"
      [clearable]="!single"
      (valueChange)="onUsersChange($event)"
      (zSearchTermChange)="onSearchTermChange($event)"
    />
    @if (loading) {
      <div class="flex items-center justify-end pt-2">
        <z-loader diameter="20" />
      </div>
    }
  </z-form-field>

  @if (data?.roles) {
    <z-radio-group [(ngModel)]="role" displayDensity="cosy">
      @for (role of data.roles; track role.value) {
        <z-radio  [value]="role.value">{{role.label}}</z-radio>
      }
    </z-radio-group>
  }
</div>

<div class="w-full flex justify-end">
  <div ngmButtonGroup>
    <button z-button zType="secondary" (click)="onCancel()">
      {{ 'COMPONENTS.COMMON.CANCEL' | translate: {Default: 'Cancel'} }}
    </button>
    <button z-button zType="default" cdkFocusInitial (click)="onApply()">
      {{ 'COMPONENTS.COMMON.APPLY' | translate: {Default: 'Apply'} }}
    </button>
  </div>
</div>
