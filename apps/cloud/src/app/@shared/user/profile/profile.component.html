<div class="w-full max-w-sm">
    <div class="flex flex-col items-center p-4 gap-2">
        <img class="w-24 h-24 mb-3 rounded-full" [src]="user?.imageUrl || '/assets/images/avatar-default.svg'" alt="{{user | user}}"/>
        <h5 class="mb-1 text-xl font-medium text-text-primary dark:text-white">{{user?.firstName}} {{user?.lastName}}</h5>
        <span class="text-sm text-text-tertiary dark:text-text-quaternary">
            {{ user?.email }}
        </span>

        <ng-content></ng-content>
    </div>
</div>
