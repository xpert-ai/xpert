<header xpDialogTitle cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
    <div style="pointer-events: none;">
        {{ 'PAC.MENU.AddCertifications' | translate: {Default: 'Add Certifications'} }}
    </div>
</header>

<xp-dialog-content class="flex flex-col">
    <ngm-select appearance="fill" color="accent" displayBehaviour="descriptionOnly"
        [label]=" 'PAC.KEY_WORDS.Certification' | translate: { Default: 'Certification' } "
        [selectOptions]="certifications$ | async"
        searchable
        [(ngModel)]="certificationId"
    >
    </ngm-select>
</xp-dialog-content>

<xp-dialog-actions align="end">
    <div ngmButtonGroup>
        <button z-button zType="secondary" xpDialogClose>
            {{ 'COMPONENTS.COMMON.CANCEL' | translate: {Default: 'Cancel'} }}
        </button>
        <button z-button zType="default" cdkFocusInitial [xpDialogClose]="certificationId">
            {{ 'COMPONENTS.COMMON.APPLY' | translate: {Default: 'Apply'} }}
        </button>
    </div>
</xp-dialog-actions>
