<div class="w-full h-60 flex justify-center items-center bg-center
bg-background-default-subtle dark:bg-slate-800"
    [style.background-image]="'url(' + imageUrl + ')'"
    [style.background-size]="backgroundSize"
    [style.background-repeat]="backgroundRepeat"
    >
    <input #fileUpload type="file" class="file-input h-0 w-0 invisible" accept="image/*"
        (change)="onFileSelected($event)"
        (click)="fileUpload.value=null;"
    >
    <button z-button zType="outline" ngmAppearance="dashed" displayDensity="cosy" class="backdrop-blur-md text-text-accent hover:text-text-accent" [disabled]="disabled" (click)="fileUpload.click()">
        <div class="flex justify-start items-center">
            <z-icon zType="upload"></z-icon>
            {{ 'Story.Common.Upload' | translate: {Default: "Upload"} }}
        </div>
    </button>
</div>
