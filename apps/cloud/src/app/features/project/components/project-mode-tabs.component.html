<div class="grid grid-cols-2 gap-2 rounded-2xl border border-divider-regular bg-components-card-bg p-1">
  <button
    z-button
    zType="ghost"
    type="button"
    class="rounded-xl"
    [class]="activeTab() === 'projects' ? 'bg-hover-bg text-text-primary' : 'text-text-secondary hover:bg-hover-bg'"
    (click)="selectProjects()"
  >
    {{ 'PAC.Project.ModeProjects' | translate: { Default: 'Projects' } }}
  </button>

  <button
    z-button
    zType="ghost"
    type="button"
    class="rounded-xl text-text-tertiary opacity-60"
    zDisabled
  >
    {{ 'PAC.Project.ModeKanbanAgent' | translate: { Default: 'Kanban Agent' } }}
  </button>
</div>
