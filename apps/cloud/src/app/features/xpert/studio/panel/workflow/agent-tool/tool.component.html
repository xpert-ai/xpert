<div class="space-y-2">
  <div class="">
    <div class="system-sm-semibold leading-8 text-text-secondary">
      {{ 'PAC.KEY_WORDS.Name' | translate }}
    </div>
    <div class="relative w-full">
      <input
        class="xp-input w-full font-mono"
        [placeholder]="'PAC.Xpert.ToolName' | translate"
        [(ngModel)]="toolName"
      />
    </div>
  </div>

  <div class="">
    <div class="system-sm-semibold leading-8 text-text-secondary">
      {{ 'PAC.KEY_WORDS.Description' | translate }}
    </div>
    <div>
      <textarea
        class="xp-input min-h-20 w-full font-mono"
        [placeholder]="'PAC.Xpert.ToolDescription' | translate"
        [(ngModel)]="toolDescription"
      ></textarea>
    </div>
  </div>
</div>

<xpert-output-variables-edit class="" [title]="'PAC.Xpert.ToolParameters' | translate" [(ngModel)]="parameters" />

<div class="w-full h-[0.5px] bg-divider-subtle"></div>

<div class="space-y-3">
  <div class="flex items-center justify-between gap-2">
    <div class="flex items-center gap-1 system-sm-semibold-uppercase text-text-secondary">
      <span>{{ 'PAC.Xpert.AgentToolReturnContent' | translate }}</span>
      <i
        class="ri-question-line text-text-quaternary hover:text-text-tertiary"
        [zTooltip]="'PAC.Xpert.AgentToolReturnContentTooltip' | translate"
        zPosition="top"
      ></i>
    </div>
  </div>

  <z-segmented [ngModel]="returnSourceType()" (ngModelChange)="updateReturnSourceType($event)">
    <z-segmented-item value="last_message" [label]="'PAC.Xpert.AgentToolReturnLastMessage' | translate" />
    <z-segmented-item value="variable" [label]="'PAC.Xpert.AgentToolReturnVariable' | translate" />
    <z-segmented-item value="template" [label]="'PAC.Xpert.AgentToolReturnTemplate' | translate" />
  </z-segmented>

  @switch (returnSourceType()) {
    @case ('variable') {
      <div class="rounded-lg bg-components-input-bg-normal px-1 py-0.5">
        <xpert-state-variable-select
          class="w-full"
          [variables]="variables()"
          [ngModel]="returnVariable()"
          (ngModelChange)="updateReturnVariable($event)"
        />
      </div>
    }
    @case ('template') {
      <copilot-prompt-editor
        class="relative shadow-md ngm-card-border-gradient self-stretch"
        [tooltip]="'PAC.Xpert.AgentToolReturnTemplateTooltip' | translate"
        [role]="'ai'"
        [variables]="variables()"
        [initHeight]="180"
        [prompt]="returnTemplate()"
        (promptChange)="updateReturnTemplate($event)"
      />
    }
  }
</div>

<div class="w-full h-[0.5px] bg-divider-subtle"></div>

<div class="w-full flex justify-end px-2 mb-4">
  <z-switch
    [(ngModel)]="isEnd"
    labelPosition="before"
    [zTooltip]="'PAC.Xpert.EndTool' | translate"
    zPosition="left"
    zSize="sm"
    >{{ 'PAC.Xpert.End' | translate }}</z-switch
  >
</div>
