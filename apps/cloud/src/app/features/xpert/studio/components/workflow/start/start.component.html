<div
  fNodeOutput
  class="edge absolute -right-[4px] top-4"
  [fOutputId]="node().key + '/edge'"
  fOutputConnectableSide="right"
  [fOutputMultiple]="true"
  [fCanBeConnectedInputs]="canBeConnectedInputs()"
  #menuTrigger="cdkMenuTriggerFor"
  [cdkMenuTriggerFor]="menu().template"
  [cdkMenuTriggerData]="{ fromNode: node(), menuTrigger: menuTrigger }"
>
  <div
    class="inner-dot cursor-crosshair flex justify-center items-center"
    [zTooltip]="'PAC.Xpert.ConnectWorkflow' | translate: { Default: 'Connect Workflow' }"
    zPosition="top"
  >
    <i class="ri-add-line text-white"></i>
  </div>
</div>
