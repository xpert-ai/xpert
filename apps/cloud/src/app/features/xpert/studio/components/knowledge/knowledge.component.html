<div fNodeInput [fInputId]="node().key" fInputConnectableSide="top" class="top absolute"></div>

@if (status() === 'template') {
  <i
    class="ri-spam-2-line absolute right-3 top-3 text-xl leading-5 text-orange-500"
    [zTooltip]="'PAC.Xpert.NeedReconfigure' | translate: { Default: 'Need to reconfigure' }"
  ></i>
}

<div class="w-full flex justify-start items-center px-3 pt-3 pb-2">
  <emoji-avatar [avatar]="knowledge().avatar" small class="shrink-0 mr-2 rounded-lg overflow-hidden shadow-sm" />
  <div class="flex flex-col">
    <span class="text-base">{{ knowledge().name }}</span>
  </div>
</div>

<div
  class="max-w-full max-h-14 px-4 text-text-tertiary text-sm text-left line-clamp-2"
  [title]="knowledge().description"
>
  {{ knowledge().description }}
</div>

@if (executions()?.length) {
  <div class="flex flex-wrap justify-start gap-1 px-3 pt-2 pb-3 h-10">
    @for (execution of executions(); track execution) {
      @switch (execution.data.status) {
        @case ('running') {
          <ngm-spin class="shrink-0 scale-90 origin-center" small />
        }
        @case ('fail') {
          <div
            class="xpert-status-indicator xpert-status-indicator--error"
            [zTooltip]="execution.data.error"
            zPosition="top"
          ></div>
        }
        @case ('success') {
          <div
            class="xpert-status-indicator xpert-status-indicator--success"
            [zTooltip]="execution.data.message"
            zPosition="top"
          ></div>
        }
      }
    }
  </div>
}
