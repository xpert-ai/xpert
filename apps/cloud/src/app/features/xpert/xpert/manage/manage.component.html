<div class="flex shrink-0 flex-col items-start justify-center gap-3 self-stretch p-4">
  <div class="flex items-center gap-3 self-stretch">
    <emoji-avatar [avatar]="avatar()" class="shrink-0 rounded-lg overflow-hidden" />
    <div class="flex w-full grow flex-col items-start justify-center">
      <div class="system-md-semibold w-full truncate text-text-tertiary">{{ xpert().title || xpert().name }}</div>
      <div class="system-2xs-medium-uppercase text-text-tertiary">{{ xpertType() }}</div>
    </div>
  </div>
  <div class="flex flex-wrap items-center gap-2 self-stretch">
    <button type="button" class="btn disabled:btn-disabled btn-secondary btn-small gap-[1px]" (click)="openBasic()">
      <i class="ri-edit-line text-lg mr-1"></i>
      <span class="text-sm font-medium">
        {{ 'PAC.Xpert.BasicInfo' | translate: { Default: 'Basic Info' } }}
      </span>
    </button>
    <button type="button" class="btn disabled:btn-disabled btn-secondary btn-small gap-[1px]" (click)="duplicate()">
      <i class="ri-file-copy-2-line text-lg mr-1"></i>
      <span class="text-sm font-medium">
        {{ 'PAC.ACTIONS.Duplicate' | translate: { Default: 'Duplicate' } }}
      </span>
    </button>
    <button type="button" class="btn disabled:btn-disabled btn-secondary btn-small gap-[1px]" (click)="export(true)">
      <i class="ri-file-download-line text-lg mr-1"></i>
      <span class="text-sm font-medium">
        {{ 'PAC.Xpert.ExportDSLDraft' | translate: { Default: 'Export (draft)' } }}
      </span>
    </button>
    <button type="button" class="btn disabled:btn-disabled btn-secondary btn-small gap-[1px]" (click)="export()">
      <i class="ri-download-2-line text-lg mr-1"></i>
      <span class="text-sm font-medium">
        {{ 'PAC.Xpert.ExportDSLVersion' | translate: { Default: 'Export' } }}
      </span>
    </button>
    <button type="button" class="btn disabled:btn-disabled btn-secondary btn-small gap-[1px]" (click)="importDsl()">
      <i class="ri-file-upload-line text-lg mr-1"></i>
      <span class="text-sm font-medium">
        {{ 'PAC.Xpert.ImportDSL' | translate: { Default: 'Import DSL file' } }}
      </span>
    </button>
  </div>
</div>

<div class="flex flex-1">
  <div class="flex grow flex-col gap-2 overflow-auto px-2 py-1">
    <xpert-app class="w-full max-w-full rounded-xl bg-components-card-bg" small />
    <xpert-api class="w-full max-w-full rounded-xl bg-components-card-bg" small />

    @if (exportedTemplate(); as template) {
      <div class="flex w-full items-start gap-3 rounded-lg border border-components-panel-border bg-components-card-bg p-3">
        <i class="ri-file-list-3-line mt-0.5 shrink-0 text-lg text-text-secondary"></i>
        <div class="min-w-0 flex-1">
          <div class="system-xs-semibold-uppercase text-text-tertiary">
            {{ 'PAC.Xpert.ExportedTemplate' | translate: { Default: 'Exported template' } }}
          </div>
          <div class="mt-1 truncate text-sm font-medium text-text-primary" [title]="template.filePath">
            {{ template.filePath }}
          </div>
          @if (exportedTemplateDate()) {
            <div class="mt-1 text-xs text-text-tertiary">
              {{ exportedTemplateDate() }}
            </div>
          }
        </div>
        <button
          type="button"
          class="btn disabled:btn-disabled btn-ghost btn-small danger shrink-0"
          [title]="'PAC.Xpert.DeleteExportedTemplate' | translate: { Default: 'Delete template' }"
          (click)="deleteExportedTemplate()"
        >
          <i class="ri-delete-bin-line text-lg"></i>
        </button>
      </div>
    }
  </div>
</div>

<div
  class="flex min-h-fit shrink-0 flex-col items-start justify-center gap-3 self-stretch border-t-[0.5px] border-divider-subtle p-2"
>
  <button
    type="button"
    class="btn disabled:btn-disabled btn-ghost btn-medium danger gap-0.5 text-text-tertiary hover:text-text-primary"
    (click)="delete()"
  >
    <i class="ri-delete-bin-line text-lg mr-1"></i>
    <span class="system-sm-medium">{{ 'PAC.ACTIONS.Delete' | translate: { Default: 'Delete' } }}</span>
  </button>
</div>

@if (loading()) {
  <ngm-spin class="absolute top-0 left-0 w-full h-full" />
}
