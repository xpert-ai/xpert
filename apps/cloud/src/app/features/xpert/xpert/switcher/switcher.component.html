<div class="flex items-center rounded-lg border-[0.5px] border-divider-deep bg-components-card-bg p-0.5">
  <button
    type="button"
    class="group/workspace flex h-8 items-center gap-1.5 rounded-lg px-2.5 text-sm font-semibold text-primary-600 transition hover:bg-hover-bg dark:text-text-primary"
    [class.mx-auto]="collapsed()"
    (click)="backToWorkspace()"
  >
    <span class="relative flex h-4 w-4 items-center justify-center overflow-hidden">
      <i
        class="ri-robot-2-line text-base transition-all duration-150 group-hover/workspace:scale-75 group-hover/workspace:opacity-0"
      ></i>
      <i
        class="ri-arrow-left-line absolute text-base opacity-0 transition-all duration-150 group-hover/workspace:opacity-100"
      ></i>
    </span>
    @if (!collapsed()) {
      <span>{{ 'PAC.KEY_WORDS.Workspace' | translate: { Default: 'Workspace' } }}</span>
    }
  </button>

  @if (!collapsed()) {
    <span class="px-0.5 text-sm text-text-quaternary">/</span>
    <button
      type="button"
      class="flex-1 flex h-8 items-center gap-1 rounded-lg px-2.5 overflow-hidden text-sm font-semibold text-primary-600 transition hover:bg-hover-bg dark:text-text-primary"
      [cdkMenuTriggerFor]="xpertSwitcherMenu"
      (cdkMenuOpened)="loadXperts()"
    >
      <span class="flex-1 truncate text-left">
        {{ currentXpertName() || ('PAC.Xpert.DigitalExpert' | translate: { Default: 'Digital Expert' }) }}
      </span>
      <i class="ri-arrow-down-s-line text-base text-text-secondary"></i>
    </button>
  }
</div>

<ng-template #xpertSwitcherMenu>
  <div class="cdk-menu__large w-84 overflow-hidden rounded-lg p-0!" cdkMenu @overlayAnimation1>
    <div class="max-h-72 overflow-y-auto p-1">
      @if (xpertsLoading()) {
        <div class="flex items-center gap-2.5 rounded-md px-2.5 py-3 text-sm text-text-tertiary">
          <i class="ri-loader-2-line text-base animate-spin"></i>
          <span>{{ 'PAC.Common.Loading' | translate: { Default: 'Loading...' } }}</span>
        </div>
      } @else {
        @for (item of switchableXperts(); track item.id) {
          <button
            cdkMenuItem
            type="button"
            class="group flex w-full items-center gap-2.5 rounded-md px-2.5 py-1.5 text-left transition hover:bg-hover-bg"
            [ngClass]="item.id === xpert()?.id ? 'bg-primary-50 text-primary-600' : 'text-text-primary'"
            (click)="switchXpert(item)"
          >
            <emoji-avatar [avatar]="item.avatar" small class="shrink-0 overflow-hidden rounded-md" />

            <div class="min-w-0 flex-1">
              <div class="truncate text-sm font-medium">
                {{ item.title || item.name }}
              </div>
              <div class="truncate text-xs text-text-tertiary">
                @if (item.id === xpert()?.id) {
                  {{ 'PAC.Xpert.CurrentDigitalExpert' | translate: { Default: 'Current Digital Expert' } }}
                } @else {
                  {{
                    item.description ||
                      ('PAC.Xpert.SwitchDigitalExpert' | translate: { Default: 'Switch to this digital expert' })
                  }}
                }
              </div>
            </div>

            @if (item.id === xpert()?.id) {
              <i class="ri-check-line text-base text-primary-600"></i>
            } @else {
              <i
                class="ri-arrow-right-s-line text-base text-text-quaternary opacity-0 transition group-hover:opacity-100"
              ></i>
            }
          </button>
        }
      }
    </div>

    <div class="border-t border-divider-regular p-1">
      <button
        cdkMenuItem
        type="button"
        class="flex w-full items-center gap-2.5 rounded-md px-2.5 py-1.5 text-left text-text-primary transition hover:bg-hover-bg"
        (click)="createXpert()"
      >
        <span
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-divider-regular bg-components-card-bg text-text-primary"
        >
          <i class="ri-add-line text-lg"></i>
        </span>

        <div class="min-w-0 flex-1">
          <div class="truncate text-sm font-medium">
            {{ 'PAC.Xpert.CreateDigitalExpert' | translate: { Default: 'Create Digital Expert' } }}
          </div>
          <div class="truncate text-xs text-text-tertiary">
            {{
              'PAC.Xpert.CreateDigitalExpertDesc'
                | translate: { Default: 'Quickly create a new digital expert and enter the studio' }
            }}
          </div>
        </div>

        <i class="ri-arrow-right-s-line text-base text-text-quaternary"></i>
      </button>
    </div>
  </div>
</ng-template>
