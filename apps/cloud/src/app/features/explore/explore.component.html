<ng-template #headerSearchIcon>
  <z-icon zType="search" zSize="sm" />
</ng-template>

<div
  class="relative isolate min-h-full overflow-auto bg-background"
  style="
    background-image: radial-gradient(
      circle,
      color-mix(in oklab, var(--primary) 18%, transparent) 1px,
      transparent 1px
    );
    background-size: 20px 20px;
  "
>
  <header class="sticky top-0 z-20 border-b border-border/60 bg-background/90 backdrop-blur-xl">
    <div class="flex flex-col gap-3 px-6 py-3 xl:px-10">
      <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
        <div class="flex min-w-0 items-end gap-6">
          <button
            type="button"
            [class]="
              tab() === 'skills'
                ? 'origin-bottom truncate text-3xl font-semibold leading-none text-foreground transition-[font-size,transform,color] duration-200 hover:scale-[1.03]'
                : 'origin-bottom truncate text-lg font-semibold leading-none text-muted-foreground transition-[font-size,transform,color] duration-200 hover:scale-110 hover:text-foreground md:hover:text-xl'
            "
            (click)="setTab('skills')"
          >
            {{ 'PAC.Explore.SkillPlaza' | translate: { Default: 'Skill Plaza' } }}
          </button>
          @if (agentMarketplaceEnabled()) {
            <button
              type="button"
              [class]="
                tab() === 'agent-square'
                  ? 'origin-bottom truncate text-3xl font-semibold leading-none text-foreground transition-[font-size,transform,color] duration-200 hover:scale-[1.03]'
                  : 'origin-bottom truncate text-lg font-semibold leading-none text-muted-foreground transition-[font-size,transform,color] duration-200 hover:scale-110 hover:text-foreground md:hover:text-xl'
              "
              (click)="setTab('agent-square')"
            >
              {{ 'PAC.Explore.AgentSquare.Tab' | translate: { Default: 'Agent Square' } }}
            </button>
          }
        </div>

        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-end">
          <z-input-group class="w-full sm:w-[320px]" zSize="sm" [zAddonBefore]="headerSearchIcon">
            <input
              z-input
              zSize="sm"
              class="pr-8"
              [placeholder]="
                tab() === 'skills'
                  ? ('PAC.Explore.SkillSearchPlaceholder'
                    | translate: { Default: 'Search skill name, description, or tags' })
                  : ('PAC.Explore.AgentSquare.SearchPlaceholder'
                    | translate: { Default: 'Search agents, scenarios, capabilities, or templates' })
              "
              [(ngModel)]="search"
            />
          </z-input-group>

          @if (search()) {
            <button z-button zType="ghost" zSize="sm" type="button" class="sm:-ml-11" (click)="clearSearch()">
              <z-icon zType="x" zSize="sm" />
            </button>
          }

          @if (tab() === 'skills') {
            <button
              z-button
              zSize="sm"
              type="button"
              z-menu
              zPlacement="bottomRight"
              [zMenuTriggerFor]="createMenu"
              class="bg-primary text-primary-foreground hover:bg-primary/90"
            >
              <z-icon zType="plus" zSize="sm" />
              {{ 'PAC.ACTIONS.Create' | translate: { Default: 'Create' } }}
              <z-icon zType="chevron-down" zSize="sm" />
            </button>

            <button z-button zType="outline" zSize="sm" type="button" (click)="openSkillManagement()">
              <z-icon zType="settings" zSize="sm" />
              {{ 'PAC.Explore.ManageSkills' | translate: { Default: 'Manage Skills' } }}
            </button>
          }
        </div>
      </div>
    </div>
  </header>

  <ng-template #createMenu>
    <div z-menu-content class="w-64 p-2">
      <button type="button" z-menu-item (click)="openSkillManagement()">
        <z-icon zType="upload" zSize="sm" />
        {{ 'PAC.Explore.UploadSkillPackage' | translate: { Default: 'Upload skill package' } }}
      </button>
      <button type="button" z-menu-item (click)="openInstallFromRepository()">
        <z-icon zType="search" zSize="sm" />
        {{ 'PAC.Explore.InstallFromRepository' | translate: { Default: 'Install from repository' } }}
      </button>
      <button type="button" z-menu-item (click)="openSkillManagement()">
        <z-icon zType="folder-open" zSize="sm" />
        {{ 'PAC.Explore.OpenWorkspaceSkills' | translate: { Default: 'Open workspace skills' } }}
      </button>
    </div>
  </ng-template>

  <main class="block px-6 pb-8 pt-5 xl:px-10">
    @switch (tab()) {
      @case ('agent-square') {
        @if (agentMarketplaceEnabled()) {
          <xp-explore-agent-square [search]="search()" [workspace]="defaultWorkspace()" />
        }
      }
      @default {
        <xp-explore-skills
          [mode]="mode()"
          [search]="search()"
          [workspace]="defaultWorkspace()"
          [installFromRepositoryNonce]="installFromRepositoryNonce()"
          (searchChange)="search.set($event)"
        />
      }
    }
  </main>
</div>
