<div class="pac-page-header">
  <div class="pac-page-title">{{ 'PAC.MENU.Custom SMTP' | translate: {Default: "Custom SMTP"} }}</div>

  <nav z-tab-nav-bar class="pac-tab-nav-bar" color="accent" alignTabs="start" stretchTabs="false" disableRipple
    [tabPanel]="tabPanel"
  >
    <span z-tab-link [routerLink]="['tenant']"
      routerLinkActive #rla="routerLinkActive"
      [routerLinkActiveOptions]="{exact: true}"
      [active]="rla.isActive"
    >
      <z-icon zSize="default" zType="manage_accounts"></z-icon>
      {{ 'PAC.MENU.Tenant' | translate: {Default: "Tenant"} }}
    </span>
    <span z-tab-link [routerLink]="['organization']"
      routerLinkActive #rla2="routerLinkActive"
      [routerLinkActiveOptions]="{exact: true}"
      [active]="rla2.isActive"
    >
      <z-icon zSize="default" zType="corporate_fare"></z-icon>
      {{ 'PAC.MENU.Organization' | translate: {Default: "Organization"} }}
  
      {{ organiztionName$ | async }}
    </span>
  </nav>
</div>
<z-divider></z-divider>

<z-tab-nav-panel #tabPanel class="pac-page-body flex flex-col items-center p-4"
  [@routeAnimations]="o.isActivated && o.activatedRoute.routeConfig.path">
  <router-outlet #o="outlet"></router-outlet>
</z-tab-nav-panel>
