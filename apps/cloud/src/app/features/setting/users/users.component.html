<div class="pac-page-header">
  <div class="w-full flex justify-between items-end">
    <div class="flex flex-col">
      <div class="pac-page-title">{{ 'PAC.MENU.MANAGE_USERS' | translate: {Default: 'Manage Users'} }}</div>
    </div>

    <div class="flex items-center gap-1">
      @if (canBatchImport()) {
        <button
          type="button"
          class="btn disabled:btn-disabled btn-secondary btn-large mr-2"
          (click)="batImport()"
        ><i class="ri-contacts-book-upload-line font-normal mr-1"></i>{{ 'PAC.USERS_PAGE.BatchImport' | translate: {Default: "Batch Import"} }}</button>
      }
      @if (canInviteUsers()) {
        <button
          type="button"
          class="btn disabled:btn-disabled btn-secondary btn-large mr-2"
          (click)="invite()"
        ><i class="ri-user-shared-line font-normal mr-1"></i>{{ 'PAC.ACTIONS.INVITE' | translate: {Default: "Invite"} }}</button>
      }
      @if (canCreateUsers()) {
      <button type="button" class="btn disabled:btn-disabled btn-primary btn-large"
        (click)="addUser()"
      ><i class="ri-add-line mr-1"></i>{{ 'PAC.ACTIONS.NEW' | translate: {Default: "New"} }}</button>
      }
    </div>
  </div>

  <nav z-tab-nav-bar class="pac-tab-nav-bar self-stretch max-w-full overflow-hidden" color="accent" alignTabs="start" stretchTabs="false" disableRipple displayDensity="cosy"
    [tabPanel]="tabPanel"
  >
      <span z-tab-link [routerLink]="['.']"
      routerLinkActive #rla="routerLinkActive"
      [routerLinkActiveOptions]="{exact: true}"
      [active]="rla.isActive"
    >
      <z-icon zSize="default" class="mr-1" zType="account_circle"></z-icon>
      {{ 'PAC.MENU.USERS' | translate: {Default: "Users"} }}
    </span>

    @if (showInviteTab()) {
      <span z-tab-link [routerLink]="['invites']"
        routerLinkActive #inviteRla="routerLinkActive"
        [routerLinkActiveOptions]="{exact: true}"
        [active]="inviteRla.isActive"
      >
        <z-icon zSize="default" class="mr-1" zType="person_add"></z-icon>
        {{ 'PAC.ACTIONS.INVITE' | translate: {Default: "Invite"} }}
      </span>
    }
  </nav>
</div>

<z-tab-nav-panel #tabPanel class="pac-page-body"
  [@routeAnimations]="o.isActivated && o.activatedRoute.routeConfig.path">
  <router-outlet #o="outlet"></router-outlet>
</z-tab-nav-panel>
