<div class="flex-1 overflow-y-auto">
  <ngm-table class="rounded-xl border border-divider-deep overflow-hidden"
    [columns]="[
        {
            name: 'email',
            caption: 'PAC.INVITE_PAGE.Email' | translate: {Default: 'Email'}
        },
        {
            name: 'role.name',
            caption: 'PAC.INVITE_PAGE.Role' | translate: {Default: 'Role'}
        },
        {
            name: 'invitedBy',
            caption: 'PAC.INVITE_PAGE.InvitedBy' | translate: {Default: 'Invited By'},
            cellTemplate: invitedByTempl
        },
        {
            name: 'createdAt',
            caption: 'PAC.INVITE_PAGE.CreatedAt' | translate: {Default: 'Created At'}
        },
        {
            name: 'expireDate',
            caption: 'PAC.INVITE_PAGE.Expires' | translate: {Default: 'Expires'}
        },
        {
            name: 'statusText',
            caption: 'PAC.INVITE_PAGE.Status' | translate: {Default: 'Status'},
            cellTemplate: statusTempl
        },
        {
            name: 'action',
            caption: 'PAC.INVITE_PAGE.Action' | translate: {Default: 'Action'},
            cellTemplate: actionTempl
        }
    ]"
    [data]="invites$ | async">
  </ngm-table>
</div>

<ng-template #invitedByTempl let-invitedBy="invitedBy" >
  <pac-user-profile-inline class="m-1" [user]="invitedBy" />
</ng-template>

<ng-template
  #actionTempl
  let-id="id"
  let-email="email"
  let-role="role"
  let-organization="organization"
  let-displayStatus="displayStatus"
>
  <div class="flex items-center gap-1">
    @if (canResend(displayStatus)) {
      <button
        z-button
        zType="ghost"
        zSize="icon"
        zShape="circle"
        displayDensity="cosy"
        [zTooltip]="'PAC.ACTIONS.Resend' | translate: { Default: 'Resend' }"
        zPosition="top"
        (click)="resendInvite(id, email, role, organization, displayStatus)"
      >
        <div class="flex justify-center items-center">
          <z-icon zType="refresh"></z-icon>
        </div>
      </button>
    }

    <button
      z-button
      zType="ghost"
      zSize="icon"
      zShape="circle"
      displayDensity="cosy"
      ngmAppearance="danger"
      [zTooltip]="'PAC.ACTIONS.Delete' | translate: { Default: 'Delete' }"
      zPosition="top"
      (click)="deleteInvite(id, email)"
    >
      <div class="flex justify-center items-center">
        <z-icon zType="delete"></z-icon>
      </div>
    </button>
  </div>
</ng-template>

<ng-template #statusTempl let-displayStatus="displayStatus" let-statusText="statusText">
  <span class="inline-flex items-center gap-2 rounded-lg border border-divider-regular bg-components-input-bg-normal px-2.5 py-1.5 text-xs font-medium text-text-primary">
    <span class="inline-block h-2 w-2 rounded-full" [ngClass]="statusTone(displayStatus)"></span>
    {{ statusText }}
  </span>
</ng-template>
