<header xpDialogTitle cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
  <h4 class="pointer-events-none">
    {{ 'PAC.ACTIONS.NEW' | translate: {Default: 'New'} }} 
    {{ 'PAC.KEY_WORDS.ORGANIZATION' | translate: {Default: 'Organization'} }}
  </h4>
</header>

<div xpDialogContent>
  <pac-organization-step-form #stepForm [(ngModel)]="organization"></pac-organization-step-form>
</div>

<div xpDialogActions align="end">
  <div ngmButtonGroup>
    <button z-button zType="ghost" xpDialogClose cdkFocusInitial>
      {{ 'PAC.ACTIONS.CANCEL' | translate: {Default: 'Cancel'} }}
    </button>
    
    <button z-button zType="default" color="accent" [xpDialogClose]="organization">
      {{ 'PAC.ACTIONS.APPLY' | translate: {Default: 'Apply'} }} 
    </button>
  </div>
  
</div>
