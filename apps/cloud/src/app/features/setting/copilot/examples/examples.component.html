<div class="filter-bar shrink-0 p-2 flex items-center gap-4 overflow-hidden max-w-full">
    <ngm-select class="filter-bar__item" [label]="'PAC.Copilot.ExpertRole' | translate: {Default: 'Expert Role'}"
        valueKey="key"
        searchable
        [displayBehaviour]="DisplayBehaviour.descriptionOnly"
        [selectOptions]="roles()"
        [(ngModel)]="roleFilter"
        [disabled]="loading()"
    />

    <ngm-select class="filter-bar__item" [label]="'PAC.Copilot.Examples.Command' | translate: {Default: 'Command'} "
        valueKey="key"
        searchable
        [displayBehaviour]="DisplayBehaviour.descriptionOnly"
        [selectOptions]="commands()"
        [(ngModel)]="commandFilter"
        [disabled]="loading()"
    />

    <span class="flex-1"></span>
    <input #fileUpload type="file" class="file-input invisible"
        (change)="handleUploadChange($event)"
        (click)="fileUpload.value=null;">
    <div ngmButtonGroup >
        <button z-button zType="ghost" zSize="icon" zShape="circle" [disabled]="loading()" [matTooltip]=" 'PAC.Copilot.Examples.DownloadTemplate' | translate: {Default: 'Download template'} " (click)="downloadTemplate()">
            <z-icon zType="system_update_alt"></z-icon>
        </button>

        <button z-button zType="ghost" zSize="icon" zShape="circle" [disabled]="loading()" [matTooltip]=" 'PAC.Copilot.Examples.UploadExamples' | translate: {Default: 'Upload examples'} " (click)="fileUpload.click()">
            <z-icon zType="upload"></z-icon>
        </button>

        <button z-button zType="default" zSize="icon-sm" zShape="circle" [disabled]="loading()" [matTooltip]=" 'PAC.Copilot.Examples.AddExample' | translate: {Default: 'Add example'} " (click)="addExample()">
            <z-icon zType="add"></z-icon>
        </button>
    </div>
    
</div>

<ngm-table class="flex-1 overflow-hidden" [columns]="columns()" [data]="items()" displayDensity="cosy" paging />

@if (loading()) {
    <div class="absolute w-full h-full flex justify-center items-center">
        <mat-progress-spinner mode="indeterminate" diameter="26" strokeWidth="2" />
    </div>
}

<ng-template #vector let-vector>
  @if (vector) {
    <z-icon zType="text_rotation_angleup"></z-icon>
  }
</ng-template>

<ng-template #actionTemplate let-id="id" let-input="input">
    <div class="flex items-center">
        <button z-button zType="ghost" zSize="icon" zShape="circle" [matTooltip]="'PAC.Copilot.Examples.EditExample' | translate: {Default: 'Edit example'}" (click)="editExample(id)">
            <z-icon zType="edit"></z-icon>
        </button>
        <z-divider vertical style="height: 20px;"></z-divider>
        <button z-button zType="ghost" zSize="icon" zShape="circle" ngmAppearance="danger" [matTooltip]="'PAC.Copilot.Examples.DeleteExample' | translate: {Default: 'Delete example'}" (click)="deleteExample(id, input)">
            <z-icon zType="delete"></z-icon>
        </button>
    </div>
</ng-template>

<router-outlet #o="outlet"></router-outlet>
