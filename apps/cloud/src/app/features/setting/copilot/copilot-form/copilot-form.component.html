<pac-copilot-config-form #copilotForm [copilot]="copilot()" (saved)="saved.emit()">
  <div [formGroup]="copilotForm.formGroup" class="w-full flex flex-col justify-start items-stretch">
    <div class="w-full flex flex-col justify-start items-stretch">
      <label>{{ 'PAC.Copilot.TokenLimitPerUser' | translate: {Default: 'Token Limit/User'} }}: {{copilotForm.tokenBalance() | number}}</label>
      <z-slider
        min="0"
        max="10000000"
        step="10000"
        [showValueLabel]="true"
        [formatValue]="formatBalanceLabel"
        formControlName="tokenBalance"
      ></z-slider>
    </div>

    <div class="mt-4 flex self-stretch items-center gap-2">
      <button z-button zType="secondary" type="button" class="rounded-full" [disabled]="copilotForm.formGroup.pristine" (click)="copilotForm.reset()">
        {{ 'PAC.KEY_WORDS.Cancel' | translate: {Default: 'Cancel'} }}
      </button>
      <button z-button zType="default" color="primary" type="button" class="rounded-full" [disabled]="!copilotForm.canSubmit()" (click)="copilotForm.submit()">
        <span>{{ 'PAC.ACTIONS.Save' | translate: {Default: 'Save'} }}</span>
      </button>
    </div>
  </div>
</pac-copilot-config-form>
