<div
  class="pac-knowledgebase__test-container max-w-full lg:w-[400px] lg:max-w-[400px] rounded-lg flex flex-col gap-8 m-4 p-4"
>
  <h2>{{ 'PAC.Knowledgebase.RetrievalTest' | translate: { Default: 'Retrieval Test' } }}</h2>

  <z-divider></z-divider>

  <ngm-slider-input
    [label]="'PAC.Knowledgebase.SimilarityThreshold' | translate: { Default: 'Similarity Threshold' }"
    [(ngModel)]="score"
    [min]="0"
    [max]="1"
    [step]="0.01"
  >
    <span
      class="font-notoColorEmoji"
      [zTooltip]="
        'PAC.Knowledgebase.SimilarityThresholdInfo'
          | translate
            : {
                Default:
                  'If the similarity between the query and the chunk is less than this threshold, the chunk will be filtered out.'
              }
      "
      >💡</span
    >
  </ngm-slider-input>

  <ngm-slider-input
    [label]="'PAC.Knowledgebase.TopK' | translate: { Default: 'Top Count' }"
    [(ngModel)]="topK"
    [min]="1"
    [max]="100"
    [step]="1"
  ></ngm-slider-input>
  <!-- <ngm-slider-input [label]="'关键字相似度权重'" [min]="0" [max]="1" [step]="0.01"></ngm-slider-input> -->

  <z-divider></z-divider>

  <div class="flex flex-col items-end gap-4">
    <div class="flex-1 min-w-full flex flex-col">
      <label class="ngm-input-label shrink-0">{{ 'PAC.Knowledgebase.Input' | translate: { Default: 'Input' } }}</label>
      <textarea
        class="ngm-input-element"
        z-input
        [(ngModel)]="query"
        [disabled]="loading()"
        cdkTextareaAutosize
        cdkAutosizeMinRows="2"
        cdkAutosizeMaxRows="5"
      >
      </textarea>
    </div>

    <button z-button zType="default" color="primary" [disabled]="loading() || !query()" (click)="test()">
      {{ 'PAC.Knowledgebase.Test' | translate: { Default: 'Test' } }}
    </button>
  </div>
</div>

<div class="flex-1 flex flex-col relative overflow-hidden">
  <div class="flex-1 overflow-y-auto">
    <ul role="list" class="m-4">
      @for (item of results(); track item.doc.id) {
        <li role="listitem" class="p-4 rounded-lg hover:bg-black/5 dark:hover:bg-white/10">
          <div class="mb-2 flex justify-between items-center">
            <span></span>
            <ngm-tags class="text-sm" [tags]="[{ caption: 'Score: ' + (1 - item.score).toFixed(2) }]" color="green" />
          </div>
          <span>{{ item.doc.pageContent }}</span>
        </li>
      }
    </ul>
  </div>

  @if (loading()) {
    <div class="absolute left-0 top-0 w-full h-full flex justify-center items-center">
      <z-loader [diameter]="22" />
    </div>
  }
</div>
