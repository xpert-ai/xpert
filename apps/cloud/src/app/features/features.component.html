<ng-template #emptySidebarTrigger></ng-template>
<ng-template
  #entryOnboardingActions
  let-current="current"
  let-total="total"
  let-isFirst="isFirst"
  let-isLast="isLast"
  let-prev="prev"
  let-next="next"
  let-finish="finish"
>
  @if (entryOnboardingRequiresOrganizationSwitch(current)) {
    <div class="flex items-center gap-2">
      <span class="text-xs text-muted-foreground">
        {{ 'PAC.Chat.ClawXpert.EntryGuideSwitchScopeHint' | translate }}
      </span>
      <button z-button zSize="sm" type="button" (click)="openEntryOnboardingScopeSwitcher()">
        {{ 'PAC.Chat.ClawXpert.EntryGuideSwitchScope' | translate }}
      </button>
    </div>
  } @else {
    <div class="flex items-center gap-2">
      @if (!isFirst) {
        <button z-button zType="secondary" zSize="sm" type="button" (click)="prev()">
          {{ 'PAC.ACTIONS.Back' | translate }}
        </button>
      }

      @if (isLast) {
        <button z-button zSize="sm" type="button" (click)="finish()">{{ entryOnboardingFinishText() | translate }}</button>
      } @else {
        <button z-button zSize="sm" type="button" (click)="next()">{{ 'PAC.ACTIONS.Next' | translate }}</button>
      }
    </div>
  }
</ng-template>

<z-highlight
  [zOpen]="entryOnboardingVisible()"
  [zCurrent]="entryOnboardingCurrent()"
  [zSteps]="entryOnboardingSteps()"
  [zActions]="entryOnboardingActions"
  [zFinishText]="entryOnboardingFinishText() | translate"
  (zOpenChange)="entryOnboardingOpen.set($event)"
  (zCurrentChange)="entryOnboardingCurrent.set($event)"
  (zFinish)="onEntryOnboardingFinish()"
/>

<z-layout class="flex-1 h-full" zDirection="horizontal">
  <z-sidebar
    class="pac-features__sidenav flex flex-col p-0!"
    [zWidth]="292"
    [zCollapsible]="true"
    [zCollapsed]="renderedSidebarCollapsed()"
    [zCollapsedWidth]="56"
    [zTrigger]="emptySidebarTrigger"
    (zCollapsedChange)="onCollapsedChange($event)"
  >
    <pac-cloud-sidebar
      [collapsed]="renderedSidebarCollapsed()"
      [isMobile]="isMobile()"
      [menus]="menus()"
      [user]="user$()"
      (collapsedChange)="onCollapsedChange($event)"
      (brandClick)="onBrandClick()"
      (entryGuideClick)="openEntryOnboardingGuide()"
    />
  </z-sidebar>
