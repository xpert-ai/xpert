<div class="w-full flex justify-end">
  <div class="flex max-w-[70%] flex-col items-end gap-2">
    @if (references().length) {
      <div class="flex flex-wrap justify-end gap-2">
        @for (reference of references(); track referenceKey(reference)) {
          <div
            class="inline-flex max-w-full items-center gap-2 rounded-2xl border border-divider-regular bg-background-default-subtle px-3 py-2 text-sm text-text-primary"
          >
            <div class="flex min-w-0 flex-col text-right">
              <span class="truncate font-medium">{{ referenceLabel(reference) }}</span>
              @if (referenceSource(reference); as source) {
                <span class="truncate text-xs text-text-secondary">{{ source }}</span>
              }
            </div>
          </div>
        }
      </div>
    }

    @if (message().content) {
      <div class="p-4 whitespace-pre-wrap rounded-2xl overflow-x-auto bg-components-card-bg text-text-primary">
        {{ message().content }}
      </div>
    }
  </div>
</div>
<chat-attachments class="mt-2" ngm-density large [attachments]="attachments()" />
